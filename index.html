<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --x-color: #38bdf8;
      --o-color: #f472b6;
      --accent: #22c55e;
      --accent-hover: #16a34a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--fg);
    }

    #status {
      font-size: 1.25rem;
      font-weight: 600;
      min-height: 1.75rem;
      color: var(--muted);
      text-align: center;
    }

    #status.win-x { color: var(--x-color); }
    #status.win-o { color: var(--o-color); }
    #status.draw  { color: var(--muted); }

    #scoreboard {
      display: flex;
      gap: 1.25rem;
      padding: 0.5rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg);
    }

    #scoreboard .score-x { color: var(--x-color); }
    #scoreboard .score-o { color: var(--o-color); }
    #scoreboard .score-draws { color: var(--muted); }

    #controls {
      display: flex;
      gap: 0.75rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 6rem);
      grid-template-rows: repeat(3, 6rem);
      gap: 0;
      background: var(--border);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .cell {
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      color: var(--fg);
      font-family: inherit;
      padding: 0;
    }

    .cell:hover:not(:disabled) {
      background: #273449;
    }

    .cell:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: -3px;
    }

    .cell:disabled {
      cursor: not-allowed;
    }

    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }

    .cell.winning {
      background: rgba(34, 197, 94, 0.28);
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    .cell.winning:hover:not(:disabled) {
      background: rgba(34, 197, 94, 0.28);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    .cell .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: mark-in 200ms ease-out;
    }

    @keyframes mark-in {
      from { transform: scale(0.35); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cell .mark { animation: none; }
    }

    #reset {
      background: var(--accent);
      color: #04110a;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    #reset:hover { background: var(--accent-hover); }
    #reset:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #reset-scores {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    #reset-scores:hover { background: #273449; border-color: var(--muted); }
    #reset-scores:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }
  </style>
</head>
<body>
  <main>
    <h1>Tic-Tac-Toe</h1>
    <div id="scoreboard" aria-live="polite" aria-label="Score">
      <span class="score-x">X: <span id="score-x-value">0</span></span>
      <span class="score-o">O: <span id="score-o-value">0</span></span>
      <span class="score-draws">Draws: <span id="score-draws-value">0</span></span>
    </div>
    <div id="status" aria-live="polite">Player X's turn</div>
    <div id="announcements" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="board" role="grid" aria-label="Tic-tac-toe board">
      <div role="row">
        <button class="cell" data-index="0" role="gridcell" tabindex="0"></button>
        <button class="cell" data-index="1" role="gridcell" tabindex="-1"></button>
        <button class="cell" data-index="2" role="gridcell" tabindex="-1"></button>
      </div>
      <div role="row">
        <button class="cell" data-index="3" role="gridcell" tabindex="-1"></button>
        <button class="cell" data-index="4" role="gridcell" tabindex="-1"></button>
        <button class="cell" data-index="5" role="gridcell" tabindex="-1"></button>
      </div>
      <div role="row">
        <button class="cell" data-index="6" role="gridcell" tabindex="-1"></button>
        <button class="cell" data-index="7" role="gridcell" tabindex="-1"></button>
        <button class="cell" data-index="8" role="gridcell" tabindex="-1"></button>
      </div>
    </div>
    <div id="controls">
      <button id="reset" type="button" aria-label="Reset game board">Reset Game</button>
      <button id="reset-scores" type="button" aria-label="Reset game scores">Reset Scores</button>
    </div>
  </main>

  <script>
    (function () {
      const WIN_LINES = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6],
      ];

      const board_cells = Array.from(document.querySelectorAll('.cell'));
      const status_element = document.getElementById('status');
      const announcements_element = document.getElementById('announcements');
      const reset_button = document.getElementById('reset');
      const reset_scores_button = document.getElementById('reset-scores');
      const score_x_element = document.getElementById('score-x-value');
      const score_o_element = document.getElementById('score-o-value');
      const score_draws_element = document.getElementById('score-draws-value');

      let board_state = Array(9).fill('');
      let current_player = 'X';
      let game_over = false;
      let score_x_wins = 0;
      let score_o_wins = 0;
      let score_draws = 0;
      let focused_cell_index = 0;

      function get_cell_position(index) {
        const row = Math.floor(index / 3) + 1;
        const col = (index % 3) + 1;
        return { row, col };
      }

      function get_cell_state_label(index) {
        const state = board_state[index];
        if (state === '') return 'empty';
        return state;
      }

      function update_cell_aria_label(index) {
        const { row, col } = get_cell_position(index);
        const state = get_cell_state_label(index);
        const label = `Row ${row}, Column ${col}, ${state}`;
        board_cells[index].setAttribute('aria-label', label);
      }

      function update_all_cell_labels() {
        board_cells.forEach((_, index) => update_cell_aria_label(index));
      }

      function render_status(message, css_class) {
        status_element.textContent = message;
        status_element.classList.remove('win-x', 'win-o', 'draw');
        if (css_class) status_element.classList.add(css_class);
      }

      function render_scoreboard() {
        score_x_element.textContent = String(score_x_wins);
        score_o_element.textContent = String(score_o_wins);
        score_draws_element.textContent = String(score_draws);
      }

      function detect_winner() {
        for (const line of WIN_LINES) {
          const [a, b, c] = line;
          if (board_state[a] && board_state[a] === board_state[b] && board_state[a] === board_state[c]) {
            return { player: board_state[a], line };
          }
        }
        return null;
      }

      function highlight_winning_line(line) {
        for (const cell_index of line) {
          board_cells[cell_index].classList.add('winning');
        }
      }

      function is_draw() {
        return board_state.every(cell => cell !== '');
      }

      function place_mark(cell_index) {
        if (game_over) return;
        if (board_state[cell_index] !== '') return;

        board_state[cell_index] = current_player;
        const mark_element = document.createElement('span');
        mark_element.className = 'mark';
        mark_element.textContent = current_player;
        board_cells[cell_index].textContent = '';
        board_cells[cell_index].appendChild(mark_element);
        board_cells[cell_index].classList.add(current_player.toLowerCase());
        update_cell_aria_label(cell_index);

        const winning_result = detect_winner();
        if (winning_result) {
          const winning_player = winning_result.player;
          game_over = true;
          if (winning_player === 'X') {
            score_x_wins += 1;
          } else {
            score_o_wins += 1;
          }
          highlight_winning_line(winning_result.line);
          render_scoreboard();
          render_status(`Player ${winning_player} wins!`, winning_player === 'X' ? 'win-x' : 'win-o');
          announcements_element.textContent = `${winning_player} wins!`;
          disable_remaining_cells();
          return;
        }

        if (is_draw()) {
          game_over = true;
          score_draws += 1;
          render_scoreboard();
          render_status("Draw", 'draw');
          announcements_element.textContent = "Draw!";
          return;
        }

        current_player = current_player === 'X' ? 'O' : 'X';
        render_status(`Player ${current_player}'s turn`);
        announcements_element.textContent = `${current_player} turn`;
      }

      function handle_cell_click(event) {
        place_mark(Number(event.currentTarget.dataset.index));
      }

      function move_focus(direction) {
        const row = Math.floor(focused_cell_index / 3);
        const col = focused_cell_index % 3;
        let new_index = focused_cell_index;

        if (direction === 'ArrowUp') {
          new_index = ((row - 1 + 3) % 3) * 3 + col;
        } else if (direction === 'ArrowDown') {
          new_index = ((row + 1) % 3) * 3 + col;
        } else if (direction === 'ArrowLeft') {
          new_index = row * 3 + ((col - 1 + 3) % 3);
        } else if (direction === 'ArrowRight') {
          new_index = row * 3 + ((col + 1) % 3);
        }

        set_focused_cell(new_index);
      }

      function set_focused_cell(index) {
        board_cells[focused_cell_index].tabIndex = -1;
        focused_cell_index = index;
        board_cells[focused_cell_index].tabIndex = 0;
        board_cells[focused_cell_index].focus();
      }

      function handle_cell_keydown(event) {
        if (event.key.startsWith('Arrow')) {
          event.preventDefault();
          move_focus(event.key);
        } else if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          place_mark(focused_cell_index);
        }
      }

      function disable_remaining_cells() {
        board_cells.forEach(cell => { cell.disabled = true; });
      }

      function reset_game() {
        board_state = Array(9).fill('');
        current_player = 'X';
        game_over = false;
        focused_cell_index = 0;
        board_cells.forEach(cell => {
          cell.textContent = '';
          cell.classList.remove('x', 'o', 'winning');
          cell.disabled = false;
        });
        update_all_cell_labels();
        board_cells[0].tabIndex = 0;
        board_cells.slice(1).forEach(cell => { cell.tabIndex = -1; });
        render_status("Player X's turn");
        announcements_element.textContent = "";
      }

      function reset_scores() {
        score_x_wins = 0;
        score_o_wins = 0;
        score_draws = 0;
        render_scoreboard();
      }

      board_cells.forEach((cell, index) => {
        cell.addEventListener('click', handle_cell_click);
        cell.addEventListener('keydown', handle_cell_keydown);
        if (index === 0) {
          cell.tabIndex = 0;
        } else {
          cell.tabIndex = -1;
        }
      });
      reset_button.addEventListener('click', reset_game);
      reset_scores_button.addEventListener('click', reset_scores);
      update_all_cell_labels();
      render_scoreboard();
    })();
  </script>
</body>
</html>
