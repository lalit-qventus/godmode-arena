<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <script>
    (function () {
      const stored_theme = localStorage.getItem('tic-tac-toe-theme');
      const prefers_dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const should_use_dark = stored_theme ? stored_theme === 'dark' : prefers_dark;
      if (should_use_dark) {
        document.documentElement.classList.add('dark-theme');
      }
    })();
  </script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #f1f5f9;
      --fg: #0f172a;
      --muted: #64748b;
      --border: #cbd5e1;
      --x-color: #0284c7;
      --o-color: #db2777;
      --accent: #16a34a;
      --accent-hover: #15803d;
      --accent-fg: #fafafa;
      --cell-hover: #e2e8f0;
      --winning-bg: rgba(22, 163, 74, 0.15);
      --winning-border: #16a34a;
    }

    html.dark-theme {
      --bg: #0f172a;
      --panel: #1e293b;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --x-color: #38bdf8;
      --o-color: #f472b6;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-fg: #04110a;
      --cell-hover: #273449;
      --winning-bg: rgba(34, 197, 94, 0.28);
      --winning-border: #22c55e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--fg);
    }

    #status {
      font-size: 1.25rem;
      font-weight: 600;
      min-height: 1.75rem;
      color: var(--muted);
      text-align: center;
    }

    #status.win-x { color: var(--x-color); }
    #status.win-o { color: var(--o-color); }
    #status.draw  { color: var(--muted); }

    #scoreboard {
      display: flex;
      gap: 1.25rem;
      padding: 0.5rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg);
    }

    #scoreboard .score-x { color: var(--x-color); }
    #scoreboard .score-o { color: var(--o-color); }
    #scoreboard .score-draws { color: var(--muted); }

    #controls {
      display: flex;
      gap: 0.75rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 6rem);
      grid-template-rows: repeat(3, 6rem);
      gap: 0;
      background: var(--border);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .cell {
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      color: var(--fg);
      font-family: inherit;
      padding: 0;
    }

    .cell:hover:not(:disabled) {
      background: var(--cell-hover);
    }

    .cell:disabled {
      cursor: not-allowed;
    }

    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }

    .cell.winning {
      background: var(--winning-bg);
      box-shadow: inset 0 0 0 2px var(--winning-border);
    }

    .cell.winning:hover:not(:disabled) {
      background: var(--winning-bg);
    }

    .cell .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: mark-in 200ms ease-out;
    }

    @keyframes mark-in {
      from { transform: scale(0.35); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .cell svg {
      width: 100%;
      height: 100%;
      max-width: 4.8rem;
      max-height: 4.8rem;
    }

    .cell svg.x-mark path {
      stroke: var(--x-color);
      stroke-width: 0.4rem;
      stroke-linecap: round;
      fill: none;
      animation: draw-x-stroke 150ms ease-out forwards;
    }

    .cell svg.x-mark path:nth-child(2) {
      animation-delay: 150ms;
    }

    @keyframes draw-x-stroke {
      from {
        stroke-dashoffset: var(--stroke-length);
        opacity: 0;
      }
      to {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    .cell svg.o-mark circle {
      stroke: var(--o-color);
      stroke-width: 0.4rem;
      fill: none;
      animation: draw-o-circle 200ms ease-out forwards;
    }

    @keyframes draw-o-circle {
      from {
        stroke-dashoffset: var(--o-stroke-length);
        opacity: 0;
      }
      to {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cell .mark { animation: none; }
    }

    #reset {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    #reset:hover { background: var(--accent-hover); }
    #reset:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #reset-scores {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    #reset-scores:hover { background: var(--cell-hover); border-color: var(--muted); }
    #reset-scores:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      color: var(--fg);
      transition: background 0.15s ease, border-color 0.15s ease;
      font-family: inherit;
    }

    #theme-toggle:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #theme-toggle:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    body {
      position: relative;
    }

    #player-names-modal {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #player-names-modal.hidden {
      display: none;
    }

    .modal-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .modal-content h2 {
      margin: 0 0 1.5rem 0;
      color: var(--fg);
      font-size: 1.5rem;
    }

    .name-input-group {
      margin-bottom: 1.5rem;
    }

    .name-input-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--fg);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .name-input-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      background: var(--bg);
      color: var(--fg);
      font-family: inherit;
      box-sizing: border-box;
    }

    .name-input-group input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .modal-buttons {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .modal-button {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    .modal-button:hover {
      background: var(--accent-hover);
    }

    .modal-button:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    .modal-button.secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .modal-button.secondary:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #change-names {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    #change-names:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #change-names:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    #timer-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
    }

    .timer-control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #timer-toggle {
      cursor: pointer;
      width: 1rem;
      height: 1rem;
    }

    #timer-duration {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--bg);
      color: var(--fg);
      font-family: inherit;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #timer-duration:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    #timer-display {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 4rem;
      text-align: center;
    }

    #timer-display.warning {
      color: #f59e0b;
    }

    #timer-display.critical {
      color: #ef4444;
      animation: timer-pulse 0.5s infinite;
    }

    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (prefers-reduced-motion: reduce) {
      #timer-display.critical { animation: none; }
    }

    #audio-toggle {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #audio-toggle:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #audio-toggle:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>
  <button id="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
  <div id="player-names-modal">
    <div class="modal-content">
      <h2>Enter Player Names</h2>
      <div class="name-input-group">
        <label for="player-x-input">Player X Name</label>
        <input id="player-x-input" type="text" placeholder="Player X" maxlength="20" />
      </div>
      <div class="name-input-group">
        <label for="player-o-input">Player O Name</label>
        <input id="player-o-input" type="text" placeholder="Player O" maxlength="20" />
      </div>
      <div class="modal-buttons">
        <button class="modal-button" id="set-names">Set Names</button>
      </div>
    </div>
  </div>
  <main>
    <h1>Tic-Tac-Toe</h1>
    <div id="scoreboard" aria-live="polite" aria-label="Score">
      <span class="score-x"><span id="score-x-label">X</span>: <span id="score-x-value">0</span></span>
      <span class="score-o"><span id="score-o-label">O</span>: <span id="score-o-value">0</span></span>
      <span class="score-draws">Draws: <span id="score-draws-value">0</span></span>
    </div>
    <div id="status" aria-live="polite">Player X's turn</div>
    <div id="timer-controls">
      <div class="timer-control-group">
        <input type="checkbox" id="timer-toggle" aria-label="Enable turn timer" />
        <label for="timer-toggle">Turn Timer</label>
      </div>
      <div class="timer-control-group">
        <label for="timer-duration">Duration:</label>
        <select id="timer-duration" aria-label="Timer duration in seconds">
          <option value="5">5s</option>
          <option value="10" selected>10s</option>
          <option value="15">15s</option>
          <option value="30">30s</option>
        </select>
      </div>
      <div id="timer-display" aria-live="polite" aria-label="Remaining time"></div>
    </div>
    <div id="board" role="grid" aria-label="Tic-tac-toe board">
      <button class="cell" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" data-index="8" aria-label="Cell 9"></button>
    </div>
    <div id="controls">
      <button id="reset" type="button">Reset Game</button>
      <button id="reset-scores" type="button">Reset Scores</button>
      <button id="change-names" type="button">Change Names</button>
      <button id="audio-toggle" type="button" aria-label="Toggle sound effects"></button>
    </div>
  </main>

  <script>
    (function () {
      // Confetti animation system
      const confetti_canvas = document.getElementById('confetti-canvas');
      const confetti_ctx = confetti_canvas.getContext('2d');
      let confetti_animation_id = null;
      let confetti_particles = [];
      let confetti_start_time = 0;
      const confetti_duration = 2500; // 2.5 seconds
      const confetti_colors = [
        '#0284c7', // X blue
        '#db2777', // O pink
        '#16a34a', // green
        '#f59e0b', // amber
        '#8b5cf6', // purple
        '#ec4899', // rose
        '#06b6d4', // cyan
        '#f97316', // orange
      ];

      function create_confetti_particle() {
        const angle = (Math.random() * Math.PI * 2);
        const speed = 4 + Math.random() * 6;
        return {
          x: window.innerWidth / 2,
          y: window.innerHeight / 2,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2, // bias upward
          vy_gravity: 0.15,
          rotation: Math.random() * Math.PI * 2,
          rotation_speed: (Math.random() - 0.5) * 0.2,
          size: 6 + Math.random() * 8,
          color: confetti_colors[Math.floor(Math.random() * confetti_colors.length)],
          opacity: 1,
        };
      }

      function resize_confetti_canvas() {
        confetti_canvas.width = window.innerWidth;
        confetti_canvas.height = window.innerHeight;
      }

      function draw_confetti_particle(particle) {
        confetti_ctx.save();
        confetti_ctx.globalAlpha = particle.opacity;
        confetti_ctx.translate(particle.x, particle.y);
        confetti_ctx.rotate(particle.rotation);
        confetti_ctx.fillStyle = particle.color;
        confetti_ctx.fillRect(-particle.size / 2, -particle.size / 2, particle.size, particle.size);
        confetti_ctx.restore();
      }

      function update_confetti_particle(particle, elapsed_ms) {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += particle.vy_gravity;
        particle.rotation += particle.rotation_speed;

        // Fade out in last 500ms
        if (elapsed_ms > confetti_duration - 500) {
          particle.opacity = Math.max(0, 1 - (elapsed_ms - (confetti_duration - 500)) / 500);
        }
      }

      function animate_confetti(current_time) {
        if (confetti_start_time === 0) confetti_start_time = current_time;
        const elapsed_ms = current_time - confetti_start_time;

        // Clear canvas
        confetti_ctx.clearRect(0, 0, confetti_canvas.width, confetti_canvas.height);

        // Update and draw particles
        confetti_particles.forEach(particle => {
          update_confetti_particle(particle, elapsed_ms);
          draw_confetti_particle(particle);
        });

        // Check if animation should end
        if (elapsed_ms < confetti_duration) {
          confetti_animation_id = requestAnimationFrame(animate_confetti);
        } else {
          cleanup_confetti();
        }
      }

      function cleanup_confetti() {
        if (confetti_animation_id !== null) {
          cancelAnimationFrame(confetti_animation_id);
          confetti_animation_id = null;
        }
        confetti_particles = [];
        confetti_start_time = 0;
        confetti_ctx.clearRect(0, 0, confetti_canvas.width, confetti_canvas.height);
      }

      function trigger_confetti() {
        // Clean up any existing animation first
        cleanup_confetti();

        // Initialize canvas
        resize_confetti_canvas();

        // Create particles
        const particle_count = 60 + Math.floor(Math.random() * 20); // 60-80 particles
        confetti_particles = Array.from({ length: particle_count }, () => create_confetti_particle());

        // Start animation
        confetti_animation_id = requestAnimationFrame(animate_confetti);
      }

      window.addEventListener('resize', resize_confetti_canvas);
      resize_confetti_canvas();

      // Audio system
      let audio_context = null;
      let audio_enabled = true;

      function initialize_audio_context() {
        if (audio_context) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audio_context = new AudioContext();
        } catch (e) {
          console.error('AudioContext not supported:', e);
        }
      }

      function play_click_sound() {
        if (!audio_enabled || !audio_context) return;
        if (audio_context.state === 'suspended') {
          audio_context.resume();
        }
        const now = audio_context.currentTime;
        const duration = 0.05; // 50ms

        const oscillator = audio_context.createOscillator();
        const gain = audio_context.createGain();

        oscillator.connect(gain);
        gain.connect(audio_context.destination);

        oscillator.frequency.setValueAtTime(800, now);
        oscillator.frequency.exponentialRampToValueAtTime(600, now + duration);

        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

        oscillator.start(now);
        oscillator.stop(now + duration);
      }

      function play_win_sound() {
        if (!audio_enabled || !audio_context) return;
        if (audio_context.state === 'suspended') {
          audio_context.resume();
        }
        const now = audio_context.currentTime;
        const duration = 0.5; // 500ms

        // Rising sequence: C (262Hz) -> E (330Hz) -> G (392Hz) -> C (523Hz)
        const notes = [
          { freq: 262, start: 0.0, duration: 0.1 },   // C
          { freq: 330, start: 0.12, duration: 0.1 },  // E
          { freq: 392, start: 0.24, duration: 0.1 },  // G
          { freq: 523, start: 0.36, duration: 0.14 }, // C (higher octave)
        ];

        notes.forEach(note => {
          const osc = audio_context.createOscillator();
          const gain = audio_context.createGain();

          osc.connect(gain);
          gain.connect(audio_context.destination);

          osc.frequency.setValueAtTime(note.freq, now + note.start);

          gain.gain.setValueAtTime(0.3, now + note.start);
          gain.gain.exponentialRampToValueAtTime(0.01, now + note.start + note.duration);

          osc.start(now + note.start);
          osc.stop(now + note.start + note.duration);
        });
      }

      function play_draw_sound() {
        if (!audio_enabled || !audio_context) return;
        if (audio_context.state === 'suspended') {
          audio_context.resume();
        }
        const now = audio_context.currentTime;
        const duration = 0.3; // 300ms

        const oscillator = audio_context.createOscillator();
        const gain = audio_context.createGain();

        oscillator.connect(gain);
        gain.connect(audio_context.destination);

        oscillator.frequency.setValueAtTime(440, now); // A note (neutral/flat)

        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

        oscillator.start(now);
        oscillator.stop(now + duration);
      }

      function load_audio_state() {
        const stored_state = localStorage.getItem('tic-tac-toe-audio-enabled');
        audio_enabled = stored_state !== 'false'; // default true
      }

      function save_audio_state() {
        localStorage.setItem('tic-tac-toe-audio-enabled', String(audio_enabled));
      }

      function update_audio_toggle_icon() {
        const audio_toggle_button = document.getElementById('audio-toggle');
        audio_toggle_button.textContent = audio_enabled ? '🔊' : '🔇';
        audio_toggle_button.setAttribute('aria-label', audio_enabled ? 'Mute sound' : 'Unmute sound');
      }

      // Initialize audio state on first click
      document.addEventListener('click', () => {
        if (!audio_context) {
          initialize_audio_context();
        }
      }, { once: true });

      const WIN_LINES = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6],
      ];

      const board_cells = Array.from(document.querySelectorAll('.cell'));
      const status_element = document.getElementById('status');
      const reset_button = document.getElementById('reset');
      const reset_scores_button = document.getElementById('reset-scores');
      const score_x_element = document.getElementById('score-x-value');
      const score_o_element = document.getElementById('score-o-value');
      const score_draws_element = document.getElementById('score-draws-value');
      const theme_toggle_button = document.getElementById('theme-toggle');
      const audio_toggle_button = document.getElementById('audio-toggle');
      const player_names_modal = document.getElementById('player-names-modal');
      const player_x_input = document.getElementById('player-x-input');
      const player_o_input = document.getElementById('player-o-input');
      const set_names_button = document.getElementById('set-names');
      const change_names_button = document.getElementById('change-names');
      const score_x_label = document.getElementById('score-x-label');
      const score_o_label = document.getElementById('score-o-label');
      const timer_toggle = document.getElementById('timer-toggle');
      const timer_duration_select = document.getElementById('timer-duration');
      const timer_display = document.getElementById('timer-display');

      let board_state = Array(9).fill('');
      let current_player = 'X';
      let game_over = false;
      let score_x_wins = 0;
      let score_o_wins = 0;
      let score_draws = 0;
      let player_name_x = '';
      let player_name_o = '';
      let names_set = false;

      // Timer state
      let timer_enabled = false;
      let timer_duration_seconds = 10;
      let timer_remaining_seconds = 10;
      let timer_interval_id = null;

      function load_player_names() {
        player_name_x = localStorage.getItem('tic-tac-toe-player-x') || '';
        player_name_o = localStorage.getItem('tic-tac-toe-player-o') || '';
        player_x_input.value = player_name_x;
        player_o_input.value = player_name_o;
        names_set = player_name_x !== '' || player_name_o !== '';
        if (names_set) {
          player_names_modal.classList.add('hidden');
        }
        update_scoreboard_labels();
      }

      function get_display_name(player_symbol) {
        if (player_symbol === 'X') {
          return player_name_x ? player_name_x : 'Player X';
        } else {
          return player_name_o ? player_name_o : 'Player O';
        }
      }

      function show_names_modal() {
        player_x_input.value = player_name_x;
        player_o_input.value = player_name_o;
        player_names_modal.classList.remove('hidden');
        player_x_input.focus();
      }

      function save_player_names() {
        const x_name = player_x_input.value.trim();
        const o_name = player_o_input.value.trim();
        player_name_x = x_name;
        player_name_o = o_name;
        localStorage.setItem('tic-tac-toe-player-x', player_name_x);
        localStorage.setItem('tic-tac-toe-player-o', player_name_o);
        names_set = true;
        player_names_modal.classList.add('hidden');
        update_scoreboard_labels();
        if (!game_over) {
          render_status(`${get_display_name(current_player)}'s turn`);
          start_timer();
        }
      }

      function update_scoreboard_labels() {
        score_x_label.textContent = player_name_x ? player_name_x : 'X';
        score_o_label.textContent = player_name_o ? player_name_o : 'O';
      }

      function save_timer_state() {
        localStorage.setItem('tic-tac-toe-timer-enabled', String(timer_enabled));
        localStorage.setItem('tic-tac-toe-timer-duration', String(timer_duration_seconds));
      }

      function load_timer_state() {
        const stored_enabled = localStorage.getItem('tic-tac-toe-timer-enabled');
        const stored_duration = localStorage.getItem('tic-tac-toe-timer-duration');
        timer_enabled = stored_enabled === 'true';
        timer_duration_seconds = stored_duration ? Number(stored_duration) : 10;
        timer_remaining_seconds = timer_duration_seconds;
        timer_toggle.checked = timer_enabled;
        timer_duration_select.value = String(timer_duration_seconds);
        update_timer_display();
      }

      function update_timer_display() {
        if (!timer_enabled || game_over) {
          timer_display.textContent = '';
          timer_display.classList.remove('warning', 'critical');
          return;
        }
        timer_display.textContent = String(timer_remaining_seconds) + 's';
        timer_display.classList.remove('warning', 'critical');
        if (timer_remaining_seconds <= 3) {
          timer_display.classList.add('critical');
        } else if (timer_remaining_seconds <= 5) {
          timer_display.classList.add('warning');
        }
      }

      function start_timer() {
        if (!timer_enabled || game_over || timer_interval_id !== null) return;
        timer_remaining_seconds = timer_duration_seconds;
        update_timer_display();
        timer_interval_id = setInterval(() => {
          timer_remaining_seconds -= 1;
          update_timer_display();
          if (timer_remaining_seconds <= 0) {
            handle_timer_expiration();
          }
        }, 1000);
      }

      function stop_timer() {
        if (timer_interval_id !== null) {
          clearInterval(timer_interval_id);
          timer_interval_id = null;
        }
        timer_display.textContent = '';
        timer_display.classList.remove('warning', 'critical');
      }

      function reset_timer() {
        stop_timer();
        if (timer_enabled && !game_over) {
          start_timer();
        }
      }

      function handle_timer_expiration() {
        stop_timer();
        render_status(`${get_display_name(current_player)} ran out of time!`);
        current_player = current_player === 'X' ? 'O' : 'X';
        setTimeout(() => {
          if (!game_over) {
            render_status(`${get_display_name(current_player)}'s turn`);
            start_timer();
          }
        }, 1500);
      }

      function get_current_theme() {
        return document.documentElement.classList.contains('dark-theme') ? 'dark' : 'light';
      }

      function update_theme_toggle_icon() {
        const is_dark = get_current_theme() === 'dark';
        theme_toggle_button.textContent = is_dark ? '☀️' : '🌙';
        theme_toggle_button.setAttribute('aria-label', is_dark ? 'Switch to light mode' : 'Switch to dark mode');
      }

      function toggle_theme() {
        const html_element = document.documentElement;
        const is_currently_dark = get_current_theme() === 'dark';
        const new_theme = is_currently_dark ? 'light' : 'dark';

        if (new_theme === 'dark') {
          html_element.classList.add('dark-theme');
        } else {
          html_element.classList.remove('dark-theme');
        }

        localStorage.setItem('tic-tac-toe-theme', new_theme);
        update_theme_toggle_icon();
      }

      function render_status(message, css_class) {
        status_element.textContent = message;
        status_element.classList.remove('win-x', 'win-o', 'draw');
        if (css_class) status_element.classList.add(css_class);
      }

      function render_scoreboard() {
        score_x_element.textContent = String(score_x_wins);
        score_o_element.textContent = String(score_o_wins);
        score_draws_element.textContent = String(score_draws);
      }

      function detect_winner() {
        for (const line of WIN_LINES) {
          const [a, b, c] = line;
          if (board_state[a] && board_state[a] === board_state[b] && board_state[a] === board_state[c]) {
            return { player: board_state[a], line };
          }
        }
        return null;
      }

      function highlight_winning_line(line) {
        for (const cell_index of line) {
          board_cells[cell_index].classList.add('winning');
        }
      }

      function is_draw() {
        return board_state.every(cell => cell !== '');
      }

      function create_x_mark_svg() {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.setAttribute('class', 'x-mark');

        // Calculate stroke length for dasharray (diagonal lines)
        const stroke_length = Math.sqrt(100 * 100 + 100 * 100) / Math.sqrt(2);

        // First diagonal: top-left to bottom-right
        const path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path1.setAttribute('d', 'M 20 20 L 80 80');
        path1.setAttribute('style', `--stroke-length: ${stroke_length}`);
        path1.setAttribute('stroke-dasharray', stroke_length);

        // Second diagonal: top-right to bottom-left
        const path2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path2.setAttribute('d', 'M 80 20 L 20 80');
        path2.setAttribute('style', `--stroke-length: ${stroke_length}`);
        path2.setAttribute('stroke-dasharray', stroke_length);

        svg.appendChild(path1);
        svg.appendChild(path2);

        return svg;
      }

      function create_o_mark_svg() {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.setAttribute('class', 'o-mark');

        // Circle with radius 30, centered at (50, 50)
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', '50');
        circle.setAttribute('cy', '50');
        circle.setAttribute('r', '30');

        // Calculate circumference for stroke animation
        const circumference = 2 * Math.PI * 30;
        circle.setAttribute('stroke-dasharray', circumference);
        circle.setAttribute('style', `--o-stroke-length: ${circumference}`);

        svg.appendChild(circle);

        return svg;
      }

      function handle_cell_click(event) {
        if (game_over) return;
        const cell_index = Number(event.currentTarget.dataset.index);
        if (board_state[cell_index] !== '') return;

        board_state[cell_index] = current_player;
        event.currentTarget.textContent = '';
        const mark_svg = current_player === 'X' ? create_x_mark_svg() : create_o_mark_svg();
        event.currentTarget.appendChild(mark_svg);
        event.currentTarget.classList.add(current_player.toLowerCase());

        play_click_sound();

        const winning_result = detect_winner();
        if (winning_result) {
          const winning_player = winning_result.player;
          game_over = true;
          stop_timer();
          if (winning_player === 'X') {
            score_x_wins += 1;
          } else {
            score_o_wins += 1;
          }
          highlight_winning_line(winning_result.line);
          render_scoreboard();
          const winning_display_name = get_display_name(winning_player);
          render_status(`${winning_display_name} wins!`, winning_player === 'X' ? 'win-x' : 'win-o');
          disable_remaining_cells();
          trigger_confetti();
          play_win_sound();
          return;
        }

        if (is_draw()) {
          game_over = true;
          stop_timer();
          score_draws += 1;
          render_scoreboard();
          render_status("Draw", 'draw');
          play_draw_sound();
          return;
        }

        current_player = current_player === 'X' ? 'O' : 'X';
        render_status(`${get_display_name(current_player)}'s turn`);
        reset_timer();
      }

      function disable_remaining_cells() {
        board_cells.forEach(cell => { cell.disabled = true; });
      }

      function reset_game() {
        cleanup_confetti();
        stop_timer();
        board_state = Array(9).fill('');
        current_player = 'X';
        game_over = false;
        board_cells.forEach(cell => {
          cell.innerHTML = '';
          cell.classList.remove('x', 'o', 'winning');
          cell.disabled = false;
        });
        render_status(`${get_display_name('X')}'s turn`);
        start_timer();
      }

      function reset_scores() {
        score_x_wins = 0;
        score_o_wins = 0;
        score_draws = 0;
        render_scoreboard();
      }

      board_cells.forEach(cell => cell.addEventListener('click', handle_cell_click));
      reset_button.addEventListener('click', reset_game);
      reset_scores_button.addEventListener('click', reset_scores);
      theme_toggle_button.addEventListener('click', toggle_theme);
      audio_toggle_button.addEventListener('click', () => {
        audio_enabled = !audio_enabled;
        save_audio_state();
        update_audio_toggle_icon();
      });
      set_names_button.addEventListener('click', save_player_names);
      change_names_button.addEventListener('click', show_names_modal);

      timer_toggle.addEventListener('change', (e) => {
        timer_enabled = e.target.checked;
        save_timer_state();
        if (timer_enabled && !game_over) {
          start_timer();
        } else {
          stop_timer();
        }
      });

      timer_duration_select.addEventListener('change', (e) => {
        timer_duration_seconds = Number(e.target.value);
        save_timer_state();
        if (!game_over) {
          reset_timer();
        }
      });

      player_x_input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') save_player_names();
      });
      player_o_input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') save_player_names();
      });

      load_player_names();
      load_timer_state();
      load_audio_state();
      render_scoreboard();
      update_theme_toggle_icon();
      update_audio_toggle_icon();
      if (!names_set) {
        show_names_modal();
      } else {
        render_status(`${get_display_name('X')}'s turn`);
        start_timer();
      }
    })();
  </script>
</body>
</html>
