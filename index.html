  <style>
    :root {

      --last-placed-ring: rgba(15, 23, 42, 0.45);
      --modal-backdrop: rgba(0, 0, 0, 0.5);
      --modal-backdrop-strong: rgba(0, 0, 0, 0.55);
      --modal-shadow-color: rgba(0, 0, 0, 0.1);
      --modal-shadow-color-strong: rgba(0, 0, 0, 0.2);
      --timer-critical: #ef4444;
      --print-bg: #fff;
      --print-fg: #000;
    }

    /* Classic theme (light) */
    html.theme-classic {
      --bg: #f8fafc;
      --panel: #f1f5f9;
      --fg: #0f172a;
      --muted: #475569;
      --border: #64748b;
      --x-color: #0369a1;
      --o-color: #be185d;
      --accent: #15803d;
      --accent-hover: #166534;
      --accent-fg: #fafafa;
      --cell-hover: #e2e8f0;
      --winning-bg: rgba(21, 128, 61, 0.15);
      --winning-border: #15803d;
      --last-placed-ring: rgba(15, 23, 42, 0.45);
    }

    /* Ocean theme */
    html.theme-ocean {
      --bg: #0f172a;
      --panel: #1a3a52;
      --fg: #e0f2fe;
      --muted: #7dd3fc;
      --border: #38bdf8;
      --x-color: #06b6d4;
      --o-color: #00d9ff;
      --accent: #0ea5e9;
      --accent-hover: #38bdf8;
      --accent-fg: #001f3f;
      --cell-hover: #1e5a7a;
      --winning-bg: rgba(6, 182, 212, 0.2);
      --winning-border: #06b6d4;
      --last-placed-ring: rgba(224, 242, 254, 0.55);
    }

    /* Sunset theme */
    html.theme-sunset {
      --bg: #7c2d12;
      --panel: #9a3412;
      --fg: #fef3c7;
      --muted: #fed7aa;
      --border: #fbbf24;
      --x-color: #fde68a;
      --o-color: #fecaca;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --accent-fg: #1c1917;
      --cell-hover: #b45309;
      --winning-bg: rgba(251, 191, 36, 0.22);
      --winning-border: #fbbf24;
      --last-placed-ring: rgba(254, 243, 199, 0.6);
    }

    /* Forest theme */
    html.theme-forest {
      --bg: #1b4332;
      --panel: #2d6a4f;
      --fg: #d8f3dc;
      --muted: #e9f5db;
      --border: #95d5b2;
      --x-color: #b7e4c7;
      --o-color: #f4fce3;
      --accent: #74c69d;
      --accent-hover: #52b788;
      --accent-fg: #0b3d2c;
      --cell-hover: #40916c;
      --winning-bg: rgba(149, 213, 178, 0.22);
      --winning-border: #95d5b2;
      --last-placed-ring: rgba(255, 249, 196, 0.65);
    }

    /* Colorblind theme (Okabe-Ito / IBM accessible palette) */
    html.theme-colorblind {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --fg: #1a1a1a;
      --muted: #555555;
      --border: #767676;
      --x-color: #0072B2;
      --o-color: #b45309;
      --accent: #007a5a;
      --accent-hover: #005c43;
      --accent-fg: #ffffff;
      --cell-hover: #e5e5e5;
      --winning-bg: rgba(0, 122, 90, 0.18);
      --winning-border: #007a5a;
    }

    html.dark-theme {
      --bg: #0f172a;
      --panel: #1e293b;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --border: #64748b;
      --x-color: #38bdf8;
      --o-color: #f472b6;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-fg: #04110a;
      --cell-hover: #273449;
      --winning-bg: rgba(34, 197, 94, 0.28);
      --winning-border: #22c55e;
      --last-placed-ring: rgba(226, 232, 240, 0.5);
    }

    /* Colorblind preset must preserve Okabe-Ito X/O/winning-line in dark mode too. */
    html.theme-colorblind.dark-theme {
      --bg: #1a1a1a;
      --panel: #2a2a2a;
      --fg: #f5f5f5;
      --muted: #bdbdbd;
      --border: #8a8a8a;
      --x-color: #56B4E9;
      --o-color: #E69F00;
      --accent: #00b383;
      --accent-hover: #00d4a0;
      --accent-fg: #0a0a0a;
      --cell-hover: #3a3a3a;
      --winning-bg: rgba(0, 179, 131, 0.28);
      --winning-border: #00b383;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      html, body { transition: none; }
    }

    .skip-link {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, -150%);
      background: var(--accent);
      color: var(--accent-fg);
      padding: 0.5rem 1rem;
      border-radius: 0 0 0.5rem 0.5rem;
      text-decoration: none;
      font-weight: 600;
      z-index: 9999;
      transition: transform 150ms ease-out;
    }

    .skip-link:focus {
      transform: translate(-50%, 0);
      outline: 2px solid var(--accent-fg);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .skip-link { transition: none; }
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--fg);
    }

    #status {
      font-size: 1.25rem;
      font-weight: 600;
      min-height: 1.75rem;
      color: var(--muted);
      text-align: center;
    }

    #status.win-x { color: var(--x-color); }
    #status.win-o { color: var(--o-color); }
    #status.draw  { color: var(--muted); }

    #scoreboard {
      display: flex;
      gap: 1.25rem;
      padding: 0.5rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg);
    }

    #scoreboard .score-x { color: var(--x-color); }
    #scoreboard .score-o { color: var(--o-color); }
    #scoreboard .score-draws { color: var(--muted); }
    #scoreboard .score-pct {
      font-size: 0.85em;
      font-weight: 500;
      margin-left: 0.15em;
    }

    #scoreboard .score-x,
    #scoreboard .score-o {
      padding: 0.1rem 0.4rem;
      border-radius: 0.375rem;
      transition: box-shadow 0.3s ease;
    }

    #scoreboard[data-turn="x"]:not([data-game-over]) .score-x {
      animation: player-turn-glow-x 1.6s ease-in-out infinite;
    }
    #scoreboard[data-turn="o"]:not([data-game-over]) .score-o {
      animation: player-turn-glow-o 1.6s ease-in-out infinite;
    }

    @keyframes player-turn-glow-x {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50%      { box-shadow: 0 0 10px 2px var(--x-color); }
    }
    @keyframes player-turn-glow-o {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50%      { box-shadow: 0 0 10px 2px var(--o-color); }
    }

    @keyframes score-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    #scoreboard .score-pop {
      display: inline-block;
      animation: score-pop 300ms ease-out;
      transform-origin: center;
    }

    @media (prefers-reduced-motion: reduce) {
      #scoreboard[data-turn="x"]:not([data-game-over]) .score-x,
      #scoreboard[data-turn="o"]:not([data-game-over]) .score-o {
        animation: none;
      }
      #scoreboard[data-turn="x"]:not([data-game-over]) .score-x {
        box-shadow: 0 0 0 2px var(--x-color);
      }
      #scoreboard[data-turn="o"]:not([data-game-over]) .score-o {
        box-shadow: 0 0 0 2px var(--o-color);
      }
      #scoreboard .score-pop { animation: none; }
    }

    #scoreboard .score-tied {
      display: inline-flex;
      align-items: center;
      padding: 0.1rem 0.5rem;
      border: 1px solid var(--accent);
      border-radius: 0.375rem;
      background: transparent;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
    }
    #scoreboard .score-tied[hidden] { display: none; }

    #round-counter {
      padding: 0.4rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg);
      margin-top: 0.5rem;
    }

    #streakboard {
      display: flex;
      gap: 1.25rem;
      padding: 0.5rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg);
      margin-top: 0.5rem;
    }

    #streakboard .current-streak-x { color: var(--x-color); }
    #streakboard .current-streak-o { color: var(--o-color); }
    #streakboard .current-streak-none { color: var(--muted); }
    #streakboard .best-streak-x { color: var(--x-color); }
    #streakboard .best-streak-o { color: var(--o-color); }
    #streakboard .best-streak-none { color: var(--muted); }

    #controls {
      display: flex;
      gap: 0.75rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 6rem);
      grid-template-rows: repeat(3, 6rem);
      gap: 0;
      background: var(--border);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
      position: relative;
    }

    #winning-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: visible;
    }

    #winning-line line {
      stroke: var(--accent);
      stroke-width: 0.14;
      stroke-linecap: round;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: draw-winning-line 300ms ease-out forwards;
    }

    @keyframes draw-winning-line {
      to { stroke-dashoffset: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #winning-line line {
        animation: none;
        stroke-dashoffset: 0;
      }
    }

    .cell {
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      transition: background 0.15s ease, transform 0.15s ease;
      transform-origin: center;
      color: var(--fg);
      font-family: inherit;
      padding: 0;
    }

    .cell:hover:not(:disabled) {
      background: var(--cell-hover);
    }

    .cell:disabled {
      cursor: default;
    }

    .cell[aria-disabled="true"] {
      cursor: not-allowed;
      pointer-events: none;
    }

    .cell[aria-disabled="true"]:not(.winning) {
      opacity: 0.85;
    }

    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }

    @media (hover: hover) and (pointer: fine) {
      #board[data-turn="x"]:not([data-game-over]) .cell:empty:not(:disabled) {
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><g fill='none' stroke-linecap='round'><path d='M10 10L22 22M22 10L10 22' stroke='white' stroke-width='6'/><path d='M10 10L22 22M22 10L10 22' stroke='%230369a1' stroke-width='4'/></g></svg>") 16 16, pointer;
      }
      #board[data-turn="o"]:not([data-game-over]) .cell:empty:not(:disabled) {
        cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><circle cx='16' cy='16' r='7' fill='none' stroke='white' stroke-width='6'/><circle cx='16' cy='16' r='7' fill='none' stroke='%23be185d' stroke-width='4'/></svg>") 16 16, pointer;
      }
      #board[data-turn="x"] .cell:empty:hover::before {
        content: "X";
        opacity: 0.25;
        color: var(--x-color);
        font-size: inherit;
        font-family: inherit;
        font-weight: inherit;
      }
      #board[data-turn="o"] .cell:empty:hover::before {
        content: "O";
        opacity: 0.25;
        color: var(--o-color);
        font-size: inherit;
        font-family: inherit;
        font-weight: inherit;
      }
      #board[data-game-over] .cell:hover::before {
        content: none;
      }
      .cell:empty:hover:not(:disabled) {
        transform: scale(1.05);
      }
      #board[data-game-over] .cell:hover {
        transform: none;
      }
    }

    .cell.last-placed {
      box-shadow: inset 0 0 0 2px var(--last-placed-ring);
      transition: box-shadow 150ms ease;
    }

    .cell.winning {
      background: var(--winning-bg);
      box-shadow: inset 0 0 0 2px var(--winning-border);
    }

    .cell.winning:hover:not(:disabled) {
      background: var(--winning-bg);
    }

    .cell .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: mark-in 200ms ease-out;
    }

    @keyframes mark-in {
      from { transform: scale(0.35); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .cell svg {
      width: 100%;
      height: 100%;
      max-width: 4.8rem;
      max-height: 4.8rem;
    }

    .cell svg.x-mark path {
      stroke: var(--x-color);
      stroke-width: 0.4rem;
      stroke-linecap: round;
      fill: none;
      animation: draw-x-stroke 150ms ease-out forwards;
    }

    .cell svg.x-mark path:nth-child(2) {
      animation-delay: 150ms;
    }

    @keyframes draw-x-stroke {
      from {
        stroke-dashoffset: var(--stroke-length);
        opacity: 0;
      }
      to {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    .cell svg.o-mark circle {
      stroke: var(--o-color);
      stroke-width: 0.4rem;
      fill: none;
      animation: draw-o-circle 200ms ease-out forwards;
    }

    @keyframes draw-o-circle {
      from {
        stroke-dashoffset: var(--o-stroke-length);
        opacity: 0;
      }
      to {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cell .mark { animation: none; }
      .cell.last-placed { transition: none; }
      .cell { transition: background 0.15s ease; }
      .cell:empty:hover:not(:disabled) { transform: none; }
    }

    #reset {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    #reset:hover { background: var(--accent-hover); }
    #reset:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #reset-scores {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    #reset-scores:hover { background: var(--cell-hover); border-color: var(--muted); }
    #reset-scores:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      color: var(--fg);
      transition: background 0.15s ease, border-color 0.15s ease;
      font-family: inherit;
    }

    #theme-toggle:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #theme-toggle:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    body {
      position: relative;
    }

    #player-names-modal {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--modal-backdrop);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #player-names-modal.hidden {
      display: none;
    }

    .modal-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px var(--modal-shadow-color);
    }

    .modal-content h2 {
      margin: 0 0 1.5rem 0;
      color: var(--fg);
      font-size: 1.5rem;
    }

    .name-input-group {
      margin-bottom: 1.5rem;
    }

    .name-input-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--fg);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .name-input-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      background: var(--bg);
      color: var(--fg);
      font-family: inherit;
      box-sizing: border-box;
    }

    .name-input-group input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .modal-buttons {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .modal-button {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    .modal-button:hover {
      background: var(--accent-hover);
    }

    .modal-button:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    .modal-button.secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .modal-button.secondary:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #change-names {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;

    }

      outline-offset: 2px;
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    #turn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    #timer-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.9rem;
    }

    #timer-toggle {
      cursor: pointer;
      width: 1rem;
      height: 1rem;
    }

    #timer-display {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 3rem;
      text-align: center;
    }

    #timer-display.critical {

      animation: timer-pulse 0.5s infinite;
    }

    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (prefers-reduced-motion: reduce) {
      #timer-display.critical { animation: none; }
    }

    @keyframes board-shake {
      0%   { transform: translateX(0); }
      10%  { transform: translateX(-4px); }
      20%  { transform: translateX(4px); }
      30%  { transform: translateX(-4px); }
      40%  { transform: translateX(4px); }
      50%  { transform: translateX(-4px); }
      60%  { transform: translateX(4px); }
      70%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
      90%  { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }

    #board.shake {
      animation: board-shake 500ms ease-in-out 1;
    }

    @keyframes draw-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    #status.draw {
      animation: draw-pulse 500ms ease-in-out 1;
    }

    @media (prefers-reduced-motion: reduce) {
      #board.shake { animation: none; }
      #status.draw { animation: none; }

    #first-player-announcement {
      min-height: 1.5rem;
      margin: 0.25rem 0 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      pointer-events: none;
    }
    #first-player-announcement.show {
      animation: first-player-fade 2000ms ease-in-out 1 forwards;
    }
    #first-player-announcement.fp-x { color: var(--x-color); }
    #first-player-announcement.fp-o { color: var(--o-color); }

    @keyframes first-player-fade {
      0%   { opacity: 0; transform: translateY(-4px); }
      15%  { opacity: 1; transform: translateY(0); }

      100% { opacity: 0; transform: translateY(0); }

    #audio-toggle {

      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #audio-toggle:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #audio-toggle:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    #theme-selector {
      position: absolute;
      top: 1rem;
      left: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 100;
    }

    .theme-button {
      width: 2.5rem;
      height: 2.5rem;
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--fg);
      background: var(--panel);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-button:hover {
      background: var(--cell-hover);
      border-color: var(--accent);
    }

    .theme-button.active {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }

    .theme-button:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    #game-area {

      flex-direction: column;
      align-items: center;

    @media (min-width: 640px) {

        align-items: flex-start;

    #history-panel {

      padding: 0.75rem 1rem;
      color: var(--fg);
    }

    #history-panel h2 {

      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--fg);
    }

    #history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: 0.9rem;
      font-family: inherit;

    #history-list li:last-child {

    .history-move-number {
      color: var(--muted);

      min-width: 1.75rem;
    }

    .history-player-x {
      color: var(--x-color);

    .history-player-o {
      color: var(--o-color);

    #history-empty {

    #undo {

      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
    }

    #undo:hover:not(:disabled) {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #undo:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    #undo:disabled {
      opacity: 0.5;
      cursor: not-allowed;

    #game-over-modal {
      position: fixed;
      inset: 0;
      background: var(--modal-backdrop-strong);

      align-items: center;
      justify-content: center;
      z-index: 1100;
      opacity: 0;
      transition: opacity 200ms ease;
    }
    #game-over-modal[hidden] { display: none; }
    #game-over-modal.open { opacity: 1; }

    #game-over-modal .game-over-content {

      border-radius: 0.5rem;

      transition: transform 200ms ease;
      min-width: 16rem;
    }
    #game-over-modal.open .game-over-content { transform: scale(1); }

    #game-over-modal .game-over-title {
      margin: 0 0 1.25rem 0;
      font-size: 1.75rem;
      color: var(--fg);
    }
    #game-over-modal .game-over-title.win-x { color: var(--x-color); }
    #game-over-modal .game-over-title.win-o { color: var(--o-color); }
    #game-over-modal .game-over-title.draw { color: var(--muted); }

    @media (prefers-reduced-motion: reduce) {
      #game-over-modal,
      #game-over-modal .game-over-content { transition: none; }
    }

    #help-overlay {
      position: fixed; inset: 0;
      background: var(--modal-backdrop-strong);
      display: flex; align-items: center; justify-content: center;
      z-index: 1100; opacity: 0;
      transition: opacity 200ms ease;
    }
    #help-overlay[hidden] { display: none; }
    #help-overlay.open { opacity: 1; }
    #help-overlay .help-content {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 0.5rem; padding: 1.5rem 1.75rem;
      box-shadow: 0 10px 25px var(--modal-shadow-color-strong);
      transform: scale(0.92); transition: transform 200ms ease;
      min-width: 20rem; max-width: min(90vw, 28rem);
    }
    #help-overlay.open .help-content { transform: scale(1); }
    #help-overlay .help-title {
      margin: 0 0 1rem 0; font-size: 1.5rem;
      color: var(--fg); text-align: center;
    }
    #help-overlay .shortcut-list {

      font-size: 0.9rem; color: var(--fg);
      background: var(--cell-hover); border: 1px solid var(--border);
      border-radius: 0.25rem;
    }
    #help-overlay .shortcut-list span { color: var(--fg); }
    #help-overlay .help-close { display: block; margin: 0 auto; }
    @media (prefers-reduced-motion: reduce) {
      #help-overlay, #help-overlay .help-content { transition: none; }
    }

    #site-footer {
      margin: 1.5rem auto 1rem;
      padding: 0 1rem;
      max-width: 48rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.4rem 0.9rem;
    }
    #site-footer .site-footer-shortcuts {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.4rem 0.9rem;
    }
    #site-footer .site-footer-shortcuts li {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    #site-footer kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.7rem;
      padding: 0.05rem 0.35rem;
      border: 1px solid var(--muted);
      border-radius: 0.25rem;
      color: var(--muted);
      background: transparent;
    }
    #site-footer .site-footer-sep {
      opacity: 0.6;
    }

    @media print {
      @page { margin: 0.5in; }

      #confetti-canvas,
      #theme-selector,
      #theme-toggle,
      #player-names-modal,
      #game-over-modal,
      #help-overlay,
      h1,
      #round-counter,
      #streakboard,

      #timer-controls,
      #history-panel,
      #controls,
      #site-footer {
        display: none !important;
      }

      html, body {
        background: var(--print-bg) !important;
        color: var(--print-fg) !important;
      }
      main {
        margin: 0 auto !important;

      }

      #scoreboard {
        background: transparent !important;

        padding: 0 !important;
      }
      #scoreboard .score-x,
      #scoreboard .score-o,

      #turn-row {

      }

      #game-area {
        display: block !important;
        margin: 0 auto !important;
      }
      #board {
        margin: 0 auto !important;
        background: var(--print-bg) !important;
        border: 1px solid var(--print-fg) !important;
        border-radius: 0 !important;
        overflow: visible !important;
        page-break-inside: avoid !important;

      .cell {

      .cell.x, .cell.o { color: var(--print-fg) !important; }

  <a class="skip-link" href="#board">Skip to game</a>
  <canvas id="confetti-canvas"></canvas>
  <div id="theme-selector" aria-label="Theme selector">
    <button class="theme-button active" data-theme="classic" aria-label="Classic theme">C</button>
    <button class="theme-button" data-theme="ocean" aria-label="Ocean theme">O</button>
    <button class="theme-button" data-theme="sunset" aria-label="Sunset theme">S</button>
    <button class="theme-button" data-theme="forest" aria-label="Forest theme">F</button>
    <button class="theme-button" data-theme="colorblind" aria-label="Colorblind theme">CB</button>
  </div>
  <button id="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
  <div id="player-names-modal">
    <div class="modal-content">
      <h2>Enter Player Names</h2>
      <div class="name-input-group">
        <label for="player-x-input">Player X Name</label>
        <input id="player-x-input" type="text" placeholder="Player X" maxlength="20" />
      </div>
      <div class="name-input-group">
        <label for="player-o-input">Player O Name</label>
        <input id="player-o-input" type="text" placeholder="Player O" maxlength="20" />
      </div>
      <div class="modal-buttons">
        <button class="modal-button" id="set-names">Set Names</button>
      </div>
    </div>
  </div>
  <div id="game-over-modal" role="dialog" aria-modal="true" aria-labelledby="game-over-title" hidden>
    <div class="game-over-content">
      <h2 id="game-over-title" class="game-over-title"></h2>
      <button class="modal-button" id="play-again" type="button">Play Again</button>
    </div>
  </div>
  <div id="help-overlay" role="dialog" aria-modal="true" aria-labelledby="help-title" hidden>
    <div class="help-content">
      <h2 id="help-title" class="help-title">Keyboard shortcuts</h2>
      <ul class="shortcut-list" id="shortcut-list"></ul>
      <button class="modal-button help-close" id="help-close" type="button">Close</button>
    </div>
  </div>
  <main class="container">
    <h1>Tic-Tac-Toe</h1>
    <div id="scoreboard" aria-live="polite" aria-label="Score">
      <span class="score-x"><span id="score-x-label">X</span>: <span id="score-x-value">0</span> <span class="score-pct" id="score-x-pct">(0%)</span></span>
      <span class="score-tied" id="score-tied" aria-label="Scores tied">TIED</span>
      <span class="score-o"><span id="score-o-label">O</span>: <span id="score-o-value">0</span> <span class="score-pct" id="score-o-pct">(0%)</span></span>
      <span class="score-draws">Draws: <span id="score-draws-value">0</span></span>
    </div>
    <div id="round-counter" aria-live="polite" aria-atomic="true" aria-label="Current round number">
      Round <span id="round-count-value">1</span>
    </div>
    <div id="streakboard" aria-live="polite" aria-label="Win streaks">
      <span id="current-streak" class="current-streak-none">No streak</span>
      <span id="best-streak" class="best-streak-none">Best: &mdash;</span>
    </div>
    <div id="turn-row">
      <div id="status" aria-live="polite">Player X's turn</div>
      <div id="timer-display" aria-live="polite" aria-label="Remaining time"></div>
    </div>
    <div id="first-player-announcement" aria-live="polite"></div>
    <div id="timer-controls">
      <input type="checkbox" id="timer-toggle" aria-label="Enable turn timer" />
      <label for="timer-toggle">Turn Timer</label>
    </div>
    <div id="game-area">
      <div id="board" role="grid" aria-label="Tic-tac-toe board" tabindex="-1">
        <button class="cell" data-index="0" aria-label="Cell 1"></button>
        <button class="cell" data-index="1" aria-label="Cell 2"></button>
        <button class="cell" data-index="2" aria-label="Cell 3"></button>
        <button class="cell" data-index="3" aria-label="Cell 4"></button>
        <button class="cell" data-index="4" aria-label="Cell 5"></button>
        <button class="cell" data-index="5" aria-label="Cell 6"></button>
        <button class="cell" data-index="6" aria-label="Cell 7"></button>
        <button class="cell" data-index="7" aria-label="Cell 8"></button>
        <button class="cell" data-index="8" aria-label="Cell 9"></button>
        <svg id="winning-line" viewBox="0 0 3 3" preserveAspectRatio="none" aria-hidden="true"></svg>
      </div>
      <aside id="history-panel" aria-label="Move history">
        <h2>Move History</h2>
        <div id="history-empty">No moves yet</div>
        <ol id="history-list" aria-live="polite"></ol>
      </aside>
    </div>
    <div id="controls">
      <button id="undo" type="button" disabled>Undo</button>
      <button id="reset" type="button">New Round</button>
      <button id="reset-scores" type="button" aria-label="Reset score tally to zero">Reset Scores</button>
      <button id="clear-all" type="button">Clear All</button>
      <button id="change-names" type="button">Change Names</button>
      <button id="audio-toggle" type="button" aria-label="Mute sound effects" aria-pressed="false"></button>
    </div>
  </main>

  <footer id="site-footer" role="contentinfo">
    <span class="site-footer-version">v1.0</span>
    <span class="site-footer-sep" aria-hidden="true">&middot;</span>
    <ul class="site-footer-shortcuts" aria-label="Keyboard shortcuts">
      <li><kbd>R</kbd> Restart</li>
      <li><kbd>?</kbd> Help</li>
      <li><kbd>Esc</kbd> Close</li>
    </ul>
  </footer>
