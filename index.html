<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <script>
    (function () {
      const stored_theme = localStorage.getItem('tic-tac-toe-theme');
      const prefers_dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const should_use_dark = stored_theme ? stored_theme === 'dark' : prefers_dark;
      if (should_use_dark) {
        document.documentElement.classList.add('dark-theme');
      }
    })();
  </script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #f1f5f9;
      --fg: #0f172a;
      --muted: #64748b;
      --border: #cbd5e1;
      --x-color: #0284c7;
      --o-color: #db2777;
      --accent: #16a34a;
      --accent-hover: #15803d;
      --accent-fg: #fafafa;
      --cell-hover: #e2e8f0;
      --winning-bg: rgba(22, 163, 74, 0.15);
      --winning-border: #16a34a;
    }

    html.dark-theme {
      --bg: #0f172a;
      --panel: #1e293b;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --x-color: #38bdf8;
      --o-color: #f472b6;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-fg: #04110a;
      --cell-hover: #273449;
      --winning-bg: rgba(34, 197, 94, 0.28);
      --winning-border: #22c55e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--fg);
    }

    #status {
      font-size: 1.25rem;
      font-weight: 600;
      min-height: 1.75rem;
      color: var(--muted);
      text-align: center;
    }

    #status.win-x { color: var(--x-color); }
    #status.win-o { color: var(--o-color); }
    #status.draw  { color: var(--muted); }

    #scoreboard {
      display: flex;
      gap: 1.25rem;
      padding: 0.5rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg);
    }

    #scoreboard .score-x { color: var(--x-color); }
    #scoreboard .score-o { color: var(--o-color); }
    #scoreboard .score-draws { color: var(--muted); }

    #controls {
      display: flex;
      gap: 0.75rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 6rem);
      grid-template-rows: repeat(3, 6rem);
      gap: 0;
      background: var(--border);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .cell {
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      color: var(--fg);
      font-family: inherit;
      padding: 0;
    }

    .cell:hover:not(:disabled) {
      background: var(--cell-hover);
    }

    .cell:disabled {
      cursor: not-allowed;
    }

    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }

    .cell.winning {
      background: var(--winning-bg);
      box-shadow: inset 0 0 0 2px var(--winning-border);
    }

    .cell.winning:hover:not(:disabled) {
      background: var(--winning-bg);
    }

    .cell .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: mark-in 200ms ease-out;
    }

    @keyframes mark-in {
      from { transform: scale(0.35); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cell .mark { animation: none; }
    }

    #reset {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    #reset:hover { background: var(--accent-hover); }
    #reset:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #reset-scores {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    #reset-scores:hover { background: var(--cell-hover); border-color: var(--muted); }
    #reset-scores:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      color: var(--fg);
      transition: background 0.15s ease, border-color 0.15s ease;
      font-family: inherit;
    }

    #theme-toggle:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #theme-toggle:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    body {
      position: relative;
    }
  </style>
</head>
<body>
  <button id="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
  <main>
    <h1>Tic-Tac-Toe</h1>
    <div id="scoreboard" aria-live="polite" aria-label="Score">
      <span class="score-x">X: <span id="score-x-value">0</span></span>
      <span class="score-o">O: <span id="score-o-value">0</span></span>
      <span class="score-draws">Draws: <span id="score-draws-value">0</span></span>
    </div>
    <div id="status" aria-live="polite">Player X's turn</div>
    <div id="board" role="grid" aria-label="Tic-tac-toe board">
      <button class="cell" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" data-index="8" aria-label="Cell 9"></button>
    </div>
    <div id="controls">
      <button id="reset" type="button">Reset Game</button>
      <button id="reset-scores" type="button">Reset Scores</button>
    </div>
  </main>

  <script>
    (function () {
      const WIN_LINES = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6],
      ];

      const board_cells = Array.from(document.querySelectorAll('.cell'));
      const status_element = document.getElementById('status');
      const reset_button = document.getElementById('reset');
      const reset_scores_button = document.getElementById('reset-scores');
      const score_x_element = document.getElementById('score-x-value');
      const score_o_element = document.getElementById('score-o-value');
      const score_draws_element = document.getElementById('score-draws-value');
      const theme_toggle_button = document.getElementById('theme-toggle');

      let board_state = Array(9).fill('');
      let current_player = 'X';
      let game_over = false;
      let score_x_wins = 0;
      let score_o_wins = 0;
      let score_draws = 0;

      function get_current_theme() {
        return document.documentElement.classList.contains('dark-theme') ? 'dark' : 'light';
      }

      function update_theme_toggle_icon() {
        const is_dark = get_current_theme() === 'dark';
        theme_toggle_button.textContent = is_dark ? '☀️' : '🌙';
        theme_toggle_button.setAttribute('aria-label', is_dark ? 'Switch to light mode' : 'Switch to dark mode');
      }

      function toggle_theme() {
        const html_element = document.documentElement;
        const is_currently_dark = get_current_theme() === 'dark';
        const new_theme = is_currently_dark ? 'light' : 'dark';

        if (new_theme === 'dark') {
          html_element.classList.add('dark-theme');
        } else {
          html_element.classList.remove('dark-theme');
        }

        localStorage.setItem('tic-tac-toe-theme', new_theme);
        update_theme_toggle_icon();
      }

      function render_status(message, css_class) {
        status_element.textContent = message;
        status_element.classList.remove('win-x', 'win-o', 'draw');
        if (css_class) status_element.classList.add(css_class);
      }

      function render_scoreboard() {
        score_x_element.textContent = String(score_x_wins);
        score_o_element.textContent = String(score_o_wins);
        score_draws_element.textContent = String(score_draws);
      }

      function detect_winner() {
        for (const line of WIN_LINES) {
          const [a, b, c] = line;
          if (board_state[a] && board_state[a] === board_state[b] && board_state[a] === board_state[c]) {
            return { player: board_state[a], line };
          }
        }
        return null;
      }

      function highlight_winning_line(line) {
        for (const cell_index of line) {
          board_cells[cell_index].classList.add('winning');
        }
      }

      function is_draw() {
        return board_state.every(cell => cell !== '');
      }

      function handle_cell_click(event) {
        if (game_over) return;
        const cell_index = Number(event.currentTarget.dataset.index);
        if (board_state[cell_index] !== '') return;

        board_state[cell_index] = current_player;
        const mark_element = document.createElement('span');
        mark_element.className = 'mark';
        mark_element.textContent = current_player;
        event.currentTarget.textContent = '';
        event.currentTarget.appendChild(mark_element);
        event.currentTarget.classList.add(current_player.toLowerCase());

        const winning_result = detect_winner();
        if (winning_result) {
          const winning_player = winning_result.player;
          game_over = true;
          if (winning_player === 'X') {
            score_x_wins += 1;
          } else {
            score_o_wins += 1;
          }
          highlight_winning_line(winning_result.line);
          render_scoreboard();
          render_status(`Player ${winning_player} wins!`, winning_player === 'X' ? 'win-x' : 'win-o');
          disable_remaining_cells();
          return;
        }

        if (is_draw()) {
          game_over = true;
          score_draws += 1;
          render_scoreboard();
          render_status("Draw", 'draw');
          return;
        }

        current_player = current_player === 'X' ? 'O' : 'X';
        render_status(`Player ${current_player}'s turn`);
      }

      function disable_remaining_cells() {
        board_cells.forEach(cell => { cell.disabled = true; });
      }

      function reset_game() {
        board_state = Array(9).fill('');
        current_player = 'X';
        game_over = false;
        board_cells.forEach(cell => {
          cell.textContent = '';
          cell.classList.remove('x', 'o', 'winning');
          cell.disabled = false;
        });
        render_status("Player X's turn");
      }

      function reset_scores() {
        score_x_wins = 0;
        score_o_wins = 0;
        score_draws = 0;
        render_scoreboard();
      }

      board_cells.forEach(cell => cell.addEventListener('click', handle_cell_click));
      reset_button.addEventListener('click', reset_game);
      reset_scores_button.addEventListener('click', reset_scores);
      theme_toggle_button.addEventListener('click', toggle_theme);
      render_scoreboard();
      update_theme_toggle_icon();
    })();
  </script>
</body>
</html>
