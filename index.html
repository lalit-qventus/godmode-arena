<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Tic-Tac-Toe</title>
  <script>
    (function () {
      const stored_palette_theme = localStorage.getItem('tic-tac-toe-palette-theme');
      const stored_dark_mode = localStorage.getItem('darkMode');
      const prefers_dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      // Apply palette theme (Classic, Ocean, Sunset, Forest) if saved
      if (stored_palette_theme) {
        document.documentElement.classList.add('theme-' + stored_palette_theme);
      } else {
        // Default to Classic palette
        document.documentElement.classList.add('theme-classic');
      }

      // Apply dark mode if saved or preferred
      const should_use_dark = stored_dark_mode !== null ? stored_dark_mode === 'true' : prefers_dark;
      if (should_use_dark) {
        document.documentElement.classList.add('dark-theme');
      }
    })();
  </script>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #f1f5f9;
      --fg: #0f172a;
      --muted: #64748b;
      --border: #cbd5e1;
      --x-color: #0284c7;
      --o-color: #db2777;
      --accent: #16a34a;
      --accent-hover: #15803d;
      --accent-fg: #fafafa;
      --cell-hover: #e2e8f0;
      --winning-bg: rgba(22, 163, 74, 0.15);
      --winning-border: #16a34a;
    }

    /* Classic theme (light) */
    html.theme-classic {
      --bg: #f8fafc;
      --panel: #f1f5f9;
      --fg: #0f172a;
      --muted: #64748b;
      --border: #cbd5e1;
      --x-color: #0284c7;
      --o-color: #db2777;
      --accent: #16a34a;
      --accent-hover: #15803d;
      --accent-fg: #fafafa;
      --cell-hover: #e2e8f0;
      --winning-bg: rgba(22, 163, 74, 0.15);
      --winning-border: #16a34a;
    }

    /* Ocean theme */
    html.theme-ocean {
      --bg: #0f172a;
      --panel: #1a3a52;
      --fg: #e0f2fe;
      --muted: #7dd3fc;
      --border: #0369a1;
      --x-color: #06b6d4;
      --o-color: #00d9ff;
      --accent: #0ea5e9;
      --accent-hover: #0284c7;
      --accent-fg: #001f3f;
      --cell-hover: #1e5a7a;
      --winning-bg: rgba(6, 182, 212, 0.2);
      --winning-border: #06b6d4;
    }

    /* Sunset theme */
    html.theme-sunset {
      --bg: #7c2d12;
      --panel: #9a3412;
      --fg: #fef3c7;
      --muted: #fed7aa;
      --border: #dc2626;
      --x-color: #f59e0b;
      --o-color: #ef4444;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --accent-fg: #1c1917;
      --cell-hover: #b45309;
      --winning-bg: rgba(249, 115, 22, 0.2);
      --winning-border: #f97316;
    }

    /* Forest theme */
    html.theme-forest {
      --bg: #1b4332;
      --panel: #2d6a4f;
      --fg: #d8f3dc;
      --muted: #a7c957;
      --border: #40916c;
      --x-color: #52b788;
      --o-color: #95d5b2;
      --accent: #74c69d;
      --accent-hover: #52b788;
      --accent-fg: #0b3d2c;
      --cell-hover: #40916c;
      --winning-bg: rgba(116, 198, 157, 0.2);
      --winning-border: #74c69d;
    }

    html.dark-theme {
      --bg: #0f172a;
      --panel: #1e293b;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --x-color: #38bdf8;
      --o-color: #f472b6;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-fg: #04110a;
      --cell-hover: #273449;
      --winning-bg: rgba(34, 197, 94, 0.28);
      --winning-border: #22c55e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      html, body { transition: none; }
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--fg);
    }

    #status {
      font-size: 1.25rem;
      font-weight: 600;
      min-height: 1.75rem;
      color: var(--muted);
      text-align: center;
    }

    #status.win-x { color: var(--x-color); }
    #status.win-o { color: var(--o-color); }
    #status.draw  { color: var(--muted); }

    #scoreboard {
      display: flex;
      gap: 1.25rem;
      padding: 0.5rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg);
    }

    #scoreboard .score-x { color: var(--x-color); }
    #scoreboard .score-o { color: var(--o-color); }
    #scoreboard .score-draws { color: var(--muted); }

    #streakboard {
      display: flex;
      gap: 1.25rem;
      padding: 0.5rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--fg);
      margin-top: 0.5rem;
    }

    #streakboard .current-streak-x { color: var(--x-color); }
    #streakboard .current-streak-o { color: var(--o-color); }
    #streakboard .current-streak-none { color: var(--muted); }
    #streakboard .best-streak-x { color: var(--x-color); }
    #streakboard .best-streak-o { color: var(--o-color); }
    #streakboard .best-streak-none { color: var(--muted); }

    #controls {
      display: flex;
      gap: 0.75rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 6rem);
      grid-template-rows: repeat(3, 6rem);
      gap: 0;
      background: var(--border);
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .cell {
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      color: var(--fg);
      font-family: inherit;
      padding: 0;
    }

    .cell:hover:not(:disabled) {
      background: var(--cell-hover);
    }

    .cell:disabled {
      cursor: not-allowed;
    }

    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }

    @media (hover: hover) and (pointer: fine) {
      #board[data-turn="x"] .cell:empty:hover::before {
        content: "X";
        opacity: 0.25;
        color: var(--x-color);
        font-size: inherit;
        font-family: inherit;
        font-weight: inherit;
      }
      #board[data-turn="o"] .cell:empty:hover::before {
        content: "O";
        opacity: 0.25;
        color: var(--o-color);
        font-size: inherit;
        font-family: inherit;
        font-weight: inherit;
      }
      #board[data-game-over] .cell:hover::before {
        content: none;
      }
    }

    .cell.winning {
      background: var(--winning-bg);
      box-shadow: inset 0 0 0 2px var(--winning-border);
    }

    .cell.winning:hover:not(:disabled) {
      background: var(--winning-bg);
    }

    .cell .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: mark-in 200ms ease-out;
    }

    @keyframes mark-in {
      from { transform: scale(0.35); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .cell svg {
      width: 100%;
      height: 100%;
      max-width: 4.8rem;
      max-height: 4.8rem;
    }

    .cell svg.x-mark path {
      stroke: var(--x-color);
      stroke-width: 0.4rem;
      stroke-linecap: round;
      fill: none;
      animation: draw-x-stroke 150ms ease-out forwards;
    }

    .cell svg.x-mark path:nth-child(2) {
      animation-delay: 150ms;
    }

    @keyframes draw-x-stroke {
      from {
        stroke-dashoffset: var(--stroke-length);
        opacity: 0;
      }
      to {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    .cell svg.o-mark circle {
      stroke: var(--o-color);
      stroke-width: 0.4rem;
      fill: none;
      animation: draw-o-circle 200ms ease-out forwards;
    }

    @keyframes draw-o-circle {
      from {
        stroke-dashoffset: var(--o-stroke-length);
        opacity: 0;
      }
      to {
        stroke-dashoffset: 0;
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cell .mark { animation: none; }
    }

    #reset {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    #reset:hover { background: var(--accent-hover); }
    #reset:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #reset-scores {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    #reset-scores:hover { background: var(--cell-hover); border-color: var(--muted); }
    #reset-scores:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

    #theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      color: var(--fg);
      transition: background 0.15s ease, border-color 0.15s ease;
      font-family: inherit;
    }

    #theme-toggle:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #theme-toggle:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    body {
      position: relative;
    }

    #player-names-modal {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #player-names-modal.hidden {
      display: none;
    }

    .modal-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .modal-content h2 {
      margin: 0 0 1.5rem 0;
      color: var(--fg);
      font-size: 1.5rem;
    }

    .name-input-group {
      margin-bottom: 1.5rem;
    }

    .name-input-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--fg);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .name-input-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      background: var(--bg);
      color: var(--fg);
      font-family: inherit;
      box-sizing: border-box;
    }

    .name-input-group input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .modal-buttons {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .modal-button {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    .modal-button:hover {
      background: var(--accent-hover);
    }

    .modal-button:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    .modal-button.secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .modal-button.secondary:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #change-names {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    #change-names:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #change-names:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    #turn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    #timer-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.9rem;
    }

    #timer-toggle {
      cursor: pointer;
      width: 1rem;
      height: 1rem;
    }

    #timer-display {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 3rem;
      text-align: center;
    }

    #timer-display.critical {
      color: #ef4444;
      animation: timer-pulse 0.5s infinite;
    }

    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (prefers-reduced-motion: reduce) {
      #timer-display.critical { animation: none; }
    }

    @keyframes board-shake {
      0%   { transform: translateX(0); }
      10%  { transform: translateX(-4px); }
      20%  { transform: translateX(4px); }
      30%  { transform: translateX(-4px); }
      40%  { transform: translateX(4px); }
      50%  { transform: translateX(-4px); }
      60%  { transform: translateX(4px); }
      70%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
      90%  { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }

    #board.shake {
      animation: board-shake 500ms ease-in-out 1;
    }

    @keyframes draw-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    #status.draw {
      animation: draw-pulse 500ms ease-in-out 1;
    }

    @media (prefers-reduced-motion: reduce) {
      #board.shake { animation: none; }
      #status.draw { animation: none; }
      #first-player-announcement.show { animation: none; opacity: 1; }
    }

    #first-player-announcement {
      min-height: 1.5rem;
      margin: 0.25rem 0 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      pointer-events: none;
    }
    #first-player-announcement.show {
      animation: first-player-fade 2000ms ease-in-out 1 forwards;
    }
    #first-player-announcement.fp-x { color: var(--x-color); }
    #first-player-announcement.fp-o { color: var(--o-color); }

    @keyframes first-player-fade {
      0%   { opacity: 0; transform: translateY(-4px); }
      15%  { opacity: 1; transform: translateY(0); }
      70%  { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(0); }
    }

    #audio-toggle {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #audio-toggle:hover {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #audio-toggle:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    #theme-selector {
      position: absolute;
      top: 1rem;
      left: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 100;
    }

    .theme-button {
      width: 2.5rem;
      height: 2.5rem;
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--fg);
      background: var(--panel);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-button:hover {
      background: var(--cell-hover);
      border-color: var(--accent);
    }

    .theme-button.active {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }

    .theme-button:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    @media (min-width: 640px) {
      #game-area {
        flex-direction: row;
        align-items: flex-start;
      }
    }

    #history-panel {
      width: 12rem;
      max-height: 18rem;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      color: var(--fg);
    }

    #history-panel h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--fg);
    }

    #history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: 0.9rem;
      font-family: inherit;
    }

    #history-list li {
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.35rem;
      align-items: baseline;
    }

    #history-list li:last-child {
      border-bottom: none;
    }

    .history-move-number {
      color: var(--muted);
      font-weight: 600;
      min-width: 1.75rem;
    }

    .history-player-x {
      color: var(--x-color);
      font-weight: 700;
    }

    .history-player-o {
      color: var(--o-color);
      font-weight: 700;
    }

    .history-cell-name {
      color: var(--fg);
    }

    #history-empty {
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
    }

    #undo {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
    }

    #undo:hover:not(:disabled) {
      background: var(--cell-hover);
      border-color: var(--muted);
    }

    #undo:focus-visible {
      outline: 2px solid var(--fg);
      outline-offset: 2px;
    }

    #undo:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #game-over-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      opacity: 0;
      transition: opacity 200ms ease;
    }
    #game-over-modal[hidden] { display: none; }
    #game-over-modal.open { opacity: 1; }

    #game-over-modal .game-over-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1.75rem 2rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      transform: scale(0.92);
      transition: transform 200ms ease;
      min-width: 16rem;
    }
    #game-over-modal.open .game-over-content { transform: scale(1); }

    #game-over-modal .game-over-title {
      margin: 0 0 1.25rem 0;
      font-size: 1.75rem;
      color: var(--fg);
    }
    #game-over-modal .game-over-title.win-x { color: var(--x-color); }
    #game-over-modal .game-over-title.win-o { color: var(--o-color); }
    #game-over-modal .game-over-title.draw { color: var(--muted); }

    @media (prefers-reduced-motion: reduce) {
      #game-over-modal,
      #game-over-modal .game-over-content { transition: none; }
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>
  <div id="theme-selector" aria-label="Theme selector">
    <button class="theme-button active" data-theme="classic" aria-label="Classic theme">C</button>
    <button class="theme-button" data-theme="ocean" aria-label="Ocean theme">O</button>
    <button class="theme-button" data-theme="sunset" aria-label="Sunset theme">S</button>
    <button class="theme-button" data-theme="forest" aria-label="Forest theme">F</button>
  </div>
  <button id="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
  <div id="player-names-modal">
    <div class="modal-content">
      <h2>Enter Player Names</h2>
      <div class="name-input-group">
        <label for="player-x-input">Player X Name</label>
        <input id="player-x-input" type="text" placeholder="Player X" maxlength="20" />
      </div>
      <div class="name-input-group">
        <label for="player-o-input">Player O Name</label>
        <input id="player-o-input" type="text" placeholder="Player O" maxlength="20" />
      </div>
      <div class="modal-buttons">
        <button class="modal-button" id="set-names">Set Names</button>
      </div>
    </div>
  </div>
  <div id="game-over-modal" role="dialog" aria-modal="true" aria-labelledby="game-over-title" hidden>
    <div class="game-over-content">
      <h2 id="game-over-title" class="game-over-title"></h2>
      <button class="modal-button" id="play-again" type="button">Play Again</button>
    </div>
  </div>
  <main>
    <h1>Tic-Tac-Toe</h1>
    <div id="scoreboard" aria-live="polite" aria-label="Score">
      <span class="score-x"><span id="score-x-label">X</span>: <span id="score-x-value">0</span></span>
      <span class="score-o"><span id="score-o-label">O</span>: <span id="score-o-value">0</span></span>
      <span class="score-draws">Draws: <span id="score-draws-value">0</span></span>
    </div>
    <div id="streakboard" aria-live="polite" aria-label="Win streaks">
      <span id="current-streak" class="current-streak-none">No streak</span>
      <span id="best-streak" class="best-streak-none">Best: &mdash;</span>
    </div>
    <div id="turn-row">
      <div id="status" aria-live="polite">Player X's turn</div>
      <div id="timer-display" aria-live="polite" aria-label="Remaining time"></div>
    </div>
    <div id="first-player-announcement" aria-live="polite"></div>
    <div id="timer-controls">
      <input type="checkbox" id="timer-toggle" aria-label="Enable turn timer" />
      <label for="timer-toggle">Turn Timer</label>
    </div>
    <div id="game-area">
      <div id="board" role="grid" aria-label="Tic-tac-toe board">
        <button class="cell" data-index="0" aria-label="Cell 1"></button>
        <button class="cell" data-index="1" aria-label="Cell 2"></button>
        <button class="cell" data-index="2" aria-label="Cell 3"></button>
        <button class="cell" data-index="3" aria-label="Cell 4"></button>
        <button class="cell" data-index="4" aria-label="Cell 5"></button>
        <button class="cell" data-index="5" aria-label="Cell 6"></button>
        <button class="cell" data-index="6" aria-label="Cell 7"></button>
        <button class="cell" data-index="7" aria-label="Cell 8"></button>
        <button class="cell" data-index="8" aria-label="Cell 9"></button>
      </div>
      <aside id="history-panel" aria-label="Move history">
        <h2>Move History</h2>
        <div id="history-empty">No moves yet</div>
        <ol id="history-list" aria-live="polite"></ol>
      </aside>
    </div>
    <div id="controls">
      <button id="undo" type="button" disabled>Undo</button>
      <button id="reset" type="button">New Round</button>
      <button id="reset-scores" type="button" aria-label="Reset score tally to zero">Reset Scores</button>
      <button id="clear-all" type="button">Clear All</button>
      <button id="change-names" type="button">Change Names</button>
      <button id="audio-toggle" type="button" aria-label="Toggle sound effects"></button>
    </div>
  </main>

  <script>
    (function () {
      // Favicon system
      function get_computed_color(css_var_name) {
        const root_style = getComputedStyle(document.documentElement);
        return root_style.getPropertyValue(css_var_name).trim();
      }

      function draw_favicon(display_text, text_color_var, bg_color = null) {
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');

        // Get colors from CSS custom properties
        const text_color = get_computed_color(text_color_var);
        const bg = bg_color ? get_computed_color(bg_color) : get_computed_color('--bg');

        // Fill background
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, 32, 32);

        // Draw text
        ctx.fillStyle = text_color;
        ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(display_text, 16, 16);

        return canvas.toDataURL('image/png');
      }

      function update_favicon() {
        let favicon_data_url;

        if (game_over) {
          if (current_player_was_winner) {
            // Winner: show winner mark with highlight background
            favicon_data_url = draw_favicon(
              current_player === 'X' ? 'X' : 'O',
              current_player === 'X' ? '--x-color' : '--o-color',
              '--accent'
            );
          } else {
            // Draw: show = mark
            favicon_data_url = draw_favicon('=', '--muted');
          }
        } else {
          // Game in progress: show current player mark in their color
          favicon_data_url = draw_favicon(
            current_player,
            current_player === 'X' ? '--x-color' : '--o-color'
          );
        }

        // Get or create favicon link element
        let favicon_link = document.querySelector('link[rel="icon"]');
        if (!favicon_link) {
          favicon_link = document.createElement('link');
          favicon_link.rel = 'icon';
          favicon_link.type = 'image/png';
          document.head.appendChild(favicon_link);
        }

        favicon_link.href = favicon_data_url;
      }

      let current_player_was_winner = false;

      // Confetti animation system
      const confetti_canvas = document.getElementById('confetti-canvas');
      const confetti_ctx = confetti_canvas.getContext('2d');
      let confetti_animation_id = null;
      let confetti_particles = [];
      let confetti_start_time = 0;
      const confetti_duration = 2500; // 2.5 seconds
      const confetti_colors = [
        '#0284c7', // X blue
        '#db2777', // O pink
        '#16a34a', // green
        '#f59e0b', // amber
        '#8b5cf6', // purple
        '#ec4899', // rose
        '#06b6d4', // cyan
        '#f97316', // orange
      ];

      function create_confetti_particle() {
        const angle = (Math.random() * Math.PI * 2);
        const speed = 4 + Math.random() * 6;
        return {
          x: window.innerWidth / 2,
          y: window.innerHeight / 2,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2, // bias upward
          vy_gravity: 0.15,
          rotation: Math.random() * Math.PI * 2,
          rotation_speed: (Math.random() - 0.5) * 0.2,
          size: 6 + Math.random() * 8,
          color: confetti_colors[Math.floor(Math.random() * confetti_colors.length)],
          opacity: 1,
        };
      }

      function resize_confetti_canvas() {
        confetti_canvas.width = window.innerWidth;
        confetti_canvas.height = window.innerHeight;
      }

      function draw_confetti_particle(particle) {
        confetti_ctx.save();
        confetti_ctx.globalAlpha = particle.opacity;
        confetti_ctx.translate(particle.x, particle.y);
        confetti_ctx.rotate(particle.rotation);
        confetti_ctx.fillStyle = particle.color;
        confetti_ctx.fillRect(-particle.size / 2, -particle.size / 2, particle.size, particle.size);
        confetti_ctx.restore();
      }

      function update_confetti_particle(particle, elapsed_ms) {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += particle.vy_gravity;
        particle.rotation += particle.rotation_speed;

        // Fade out in last 500ms
        if (elapsed_ms > confetti_duration - 500) {
          particle.opacity = Math.max(0, 1 - (elapsed_ms - (confetti_duration - 500)) / 500);
        }
      }

      function animate_confetti(current_time) {
        if (confetti_start_time === 0) confetti_start_time = current_time;
        const elapsed_ms = current_time - confetti_start_time;

        // Clear canvas
        confetti_ctx.clearRect(0, 0, confetti_canvas.width, confetti_canvas.height);

        // Update and draw particles
        confetti_particles.forEach(particle => {
          update_confetti_particle(particle, elapsed_ms);
          draw_confetti_particle(particle);
        });

        // Check if animation should end
        if (elapsed_ms < confetti_duration) {
          confetti_animation_id = requestAnimationFrame(animate_confetti);
        } else {
          cleanup_confetti();
        }
      }

      function cleanup_confetti() {
        if (confetti_animation_id !== null) {
          cancelAnimationFrame(confetti_animation_id);
          confetti_animation_id = null;
        }
        confetti_particles = [];
        confetti_start_time = 0;
        confetti_ctx.clearRect(0, 0, confetti_canvas.width, confetti_canvas.height);
      }

      function trigger_confetti() {
        // Clean up any existing animation first
        cleanup_confetti();

        // Initialize canvas
        resize_confetti_canvas();

        // Create particles
        const particle_count = 60 + Math.floor(Math.random() * 20); // 60-80 particles
        confetti_particles = Array.from({ length: particle_count }, () => create_confetti_particle());

        // Start animation
        confetti_animation_id = requestAnimationFrame(animate_confetti);
      }

      window.addEventListener('resize', resize_confetti_canvas);
      resize_confetti_canvas();

      // Audio system
      let audio_context = null;
      let audio_enabled = true;

      function initialize_audio_context() {
        if (audio_context) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audio_context = new AudioContext();
        } catch (e) {
          console.error('AudioContext not supported:', e);
        }
      }

      function play_click_sound() {
        if (!audio_enabled || !audio_context) return;
        if (audio_context.state === 'suspended') {
          audio_context.resume();
        }
        const now = audio_context.currentTime;
        const duration = 0.05; // 50ms

        const oscillator = audio_context.createOscillator();
        const gain = audio_context.createGain();

        oscillator.connect(gain);
        gain.connect(audio_context.destination);

        oscillator.frequency.setValueAtTime(800, now);
        oscillator.frequency.exponentialRampToValueAtTime(600, now + duration);

        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

        oscillator.start(now);
        oscillator.stop(now + duration);
      }

      function play_win_sound() {
        if (!audio_enabled || !audio_context) return;
        if (audio_context.state === 'suspended') {
          audio_context.resume();
        }
        const now = audio_context.currentTime;
        const duration = 0.5; // 500ms

        // Rising sequence: C (262Hz) -> E (330Hz) -> G (392Hz) -> C (523Hz)
        const notes = [
          { freq: 262, start: 0.0, duration: 0.1 },   // C
          { freq: 330, start: 0.12, duration: 0.1 },  // E
          { freq: 392, start: 0.24, duration: 0.1 },  // G
          { freq: 523, start: 0.36, duration: 0.14 }, // C (higher octave)
        ];

        notes.forEach(note => {
          const osc = audio_context.createOscillator();
          const gain = audio_context.createGain();

          osc.connect(gain);
          gain.connect(audio_context.destination);

          osc.frequency.setValueAtTime(note.freq, now + note.start);

          gain.gain.setValueAtTime(0.3, now + note.start);
          gain.gain.exponentialRampToValueAtTime(0.01, now + note.start + note.duration);

          osc.start(now + note.start);
          osc.stop(now + note.start + note.duration);
        });
      }

      function play_draw_sound() {
        if (!audio_enabled || !audio_context) return;
        if (audio_context.state === 'suspended') {
          audio_context.resume();
        }
        const now = audio_context.currentTime;
        const duration = 0.3; // 300ms

        const oscillator = audio_context.createOscillator();
        const gain = audio_context.createGain();

        oscillator.connect(gain);
        gain.connect(audio_context.destination);

        oscillator.frequency.setValueAtTime(440, now); // A note (neutral/flat)

        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

        oscillator.start(now);
        oscillator.stop(now + duration);
      }

      function load_audio_state() {
        const stored_state = localStorage.getItem('tic-tac-toe-audio-enabled');
        audio_enabled = stored_state !== 'false'; // default true
      }

      function save_audio_state() {
        localStorage.setItem('tic-tac-toe-audio-enabled', String(audio_enabled));
      }

      function update_audio_toggle_icon() {
        const audio_toggle_button = document.getElementById('audio-toggle');
        audio_toggle_button.textContent = audio_enabled ? '🔊' : '🔇';
        audio_toggle_button.setAttribute('aria-label', audio_enabled ? 'Mute sound' : 'Unmute sound');
      }

      // Initialize audio state on first click
      document.addEventListener('click', () => {
        if (!audio_context) {
          initialize_audio_context();
        }
      }, { once: true });

      const WIN_LINES = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6],
      ];

      const CELL_POSITION_NAMES = [
        'top-left', 'top', 'top-right',
        'left', 'center', 'right',
        'bottom-left', 'bottom', 'bottom-right',
      ];

      const board_cells = Array.from(document.querySelectorAll('.cell'));
      const status_element = document.getElementById('status');
      const reset_button = document.getElementById('reset');
      const reset_scores_button = document.getElementById('reset-scores');
      const undo_button = document.getElementById('undo');
      const history_list_element = document.getElementById('history-list');
      const history_empty_element = document.getElementById('history-empty');
      const clear_all_button = document.getElementById('clear-all');
      const score_x_element = document.getElementById('score-x-value');
      const score_o_element = document.getElementById('score-o-value');
      const score_draws_element = document.getElementById('score-draws-value');
      const current_streak_element = document.getElementById('current-streak');
      const best_streak_element = document.getElementById('best-streak');
      const theme_toggle_button = document.getElementById('theme-toggle');
      const audio_toggle_button = document.getElementById('audio-toggle');
      const theme_selector = document.getElementById('theme-selector');
      const theme_buttons = Array.from(theme_selector.querySelectorAll('.theme-button'));
      const player_names_modal = document.getElementById('player-names-modal');
      const player_x_input = document.getElementById('player-x-input');
      const player_o_input = document.getElementById('player-o-input');
      const set_names_button = document.getElementById('set-names');
      const change_names_button = document.getElementById('change-names');
      const score_x_label = document.getElementById('score-x-label');
      const score_o_label = document.getElementById('score-o-label');
      const timer_toggle = document.getElementById('timer-toggle');
      const timer_display = document.getElementById('timer-display');
      const game_over_modal = document.getElementById('game-over-modal');
      const game_over_title = document.getElementById('game-over-title');
      const play_again_button = document.getElementById('play-again');
      const TURN_TIMER_SECONDS = 10;

      let board_state = Array(9).fill('');
      let move_history = [];
      let first_player_this_round = Math.random() < 0.5 ? 'X' : 'O';
      let current_player = first_player_this_round;
      let game_over = false;
      let score_x_wins = 0;
      let score_o_wins = 0;
      let score_draws = 0;
      let current_streak_player = null;
      let current_streak_count = 0;
      let best_streak_player = null;
      let best_streak_count = 0;
      let player_name_x = '';
      let player_name_o = '';
      let names_set = false;

      // Timer state
      let timer_enabled = false;
      let timer_remaining_seconds = TURN_TIMER_SECONDS;
      let timer_interval_id = null;

      const GAME_STATE_STORAGE_KEY = 'tictactoe-state';

      function save_game_state() {
        const persisted_game_state = {
          board_state,
          current_player,
          first_player_this_round,
          game_over,
          score_x_wins,
          score_o_wins,
          score_draws,
          current_streak_player,
          current_streak_count,
          best_streak_player,
          best_streak_count,
        };
        try {
          localStorage.setItem(GAME_STATE_STORAGE_KEY, JSON.stringify(persisted_game_state));
        } catch (storage_write_error) {
          console.error('Failed to persist game state:', storage_write_error);
        }
      }

      function restore_game_state_from_storage() {
        const raw_stored_game_state = localStorage.getItem(GAME_STATE_STORAGE_KEY);
        if (!raw_stored_game_state) return false;
        let parsed_game_state;
        try {
          parsed_game_state = JSON.parse(raw_stored_game_state);
        } catch (json_parse_error) {
          console.warn('Corrupt tictactoe-state in localStorage, starting fresh:', json_parse_error);
          localStorage.removeItem(GAME_STATE_STORAGE_KEY);
          return false;
        }
        if (
          !parsed_game_state ||
          !Array.isArray(parsed_game_state.board_state) ||
          parsed_game_state.board_state.length !== 9 ||
          !parsed_game_state.board_state.every(cell_value =>
            cell_value === '' || cell_value === 'X' || cell_value === 'O'
          ) ||
          (parsed_game_state.current_player !== 'X' && parsed_game_state.current_player !== 'O') ||
          (parsed_game_state.first_player_this_round !== 'X' &&
            parsed_game_state.first_player_this_round !== 'O') ||
          typeof parsed_game_state.game_over !== 'boolean' ||
          !Number.isFinite(parsed_game_state.score_x_wins) ||
          !Number.isFinite(parsed_game_state.score_o_wins) ||
          !Number.isFinite(parsed_game_state.score_draws)
        ) {
          console.warn('Invalid tictactoe-state shape, starting fresh');
          localStorage.removeItem(GAME_STATE_STORAGE_KEY);
          return false;
        }
        board_state = parsed_game_state.board_state.slice();
        current_player = parsed_game_state.current_player;
        first_player_this_round = parsed_game_state.first_player_this_round;
        game_over = parsed_game_state.game_over;
        score_x_wins = parsed_game_state.score_x_wins;
        score_o_wins = parsed_game_state.score_o_wins;
        score_draws = parsed_game_state.score_draws;
        current_streak_player =
          parsed_game_state.current_streak_player === 'X' ||
          parsed_game_state.current_streak_player === 'O'
            ? parsed_game_state.current_streak_player
            : null;
        current_streak_count = Number.isFinite(parsed_game_state.current_streak_count)
          ? parsed_game_state.current_streak_count
          : 0;
        best_streak_player =
          parsed_game_state.best_streak_player === 'X' ||
          parsed_game_state.best_streak_player === 'O'
            ? parsed_game_state.best_streak_player
            : null;
        best_streak_count = Number.isFinite(parsed_game_state.best_streak_count)
          ? parsed_game_state.best_streak_count
          : 0;
        return true;
      }

      function render_restored_board() {
        for (let cell_index = 0; cell_index < board_cells.length; cell_index += 1) {
          const cell_button = board_cells[cell_index];
          const stored_mark = board_state[cell_index];
          cell_button.innerHTML = '';
          cell_button.classList.remove('x', 'o', 'winning');
          cell_button.disabled = false;
          if (stored_mark === 'X' || stored_mark === 'O') {
            const mark_svg = stored_mark === 'X' ? create_x_mark_svg() : create_o_mark_svg();
            cell_button.appendChild(mark_svg);
            cell_button.classList.add(stored_mark.toLowerCase());
          }
        }
        if (game_over) {
          const winning_result = detect_winner();
          if (winning_result) {
            highlight_winning_line(winning_result.line);
            const winning_display_name = get_display_name(winning_result.player);
            render_status(
              `${winning_display_name} wins!`,
              winning_result.player === 'X' ? 'win-x' : 'win-o'
            );
            current_player_was_winner = true;
            show_game_over_modal('win', winning_result.player);
          } else {
            render_status('Draw', 'draw');
            current_player_was_winner = false;
            show_game_over_modal('draw');
          }
          disable_remaining_cells();
        } else {
          render_status(`${get_display_name(current_player)}'s turn`);
        }
      }

      function clear_all_persistence() {
        const persistence_keys_to_clear = [
          GAME_STATE_STORAGE_KEY,
          'tic-tac-toe-player-x',
          'tic-tac-toe-player-o',
          'tic-tac-toe-theme',
          'tic-tac-toe-palette-theme',
          'tic-tac-toe-audio-enabled',
          'tic-tac-toe-timer-enabled',
          'tic-tac-toe-timer-duration',
        ];
        persistence_keys_to_clear.forEach(storage_key => {
          try {
            localStorage.removeItem(storage_key);
          } catch (storage_remove_error) {
            console.error('Failed to remove key:', storage_key, storage_remove_error);
          }
        });
        window.location.reload();
      }

      function load_player_names() {
        player_name_x = localStorage.getItem('tic-tac-toe-player-x') || '';
        player_name_o = localStorage.getItem('tic-tac-toe-player-o') || '';
        player_x_input.value = player_name_x;
        player_o_input.value = player_name_o;
        names_set = player_name_x !== '' || player_name_o !== '';
        if (names_set) {
          player_names_modal.classList.add('hidden');
        }
        update_scoreboard_labels();
      }

      function get_display_name(player_symbol) {
        if (player_symbol === 'X') {
          return player_name_x ? player_name_x : 'Player X';
        } else {
          return player_name_o ? player_name_o : 'Player O';
        }
      }

      function show_names_modal() {
        player_x_input.value = player_name_x;
        player_o_input.value = player_name_o;
        player_names_modal.classList.remove('hidden');
        player_x_input.focus();
      }

      function save_player_names() {
        const x_name = player_x_input.value.trim();
        const o_name = player_o_input.value.trim();
        const was_initial_setup = !names_set;
        player_name_x = x_name;
        player_name_o = o_name;
        localStorage.setItem('tic-tac-toe-player-x', player_name_x);
        localStorage.setItem('tic-tac-toe-player-o', player_name_o);
        names_set = true;
        player_names_modal.classList.add('hidden');
        update_scoreboard_labels();
        if (!game_over) {
          render_status(`${get_display_name(current_player)}'s turn`);
          if (was_initial_setup) {
            show_first_player_announcement(first_player_this_round);
          }
          start_timer();
        }
      }

      function update_scoreboard_labels() {
        score_x_label.textContent = player_name_x ? player_name_x : 'X';
        score_o_label.textContent = player_name_o ? player_name_o : 'O';
        if (typeof render_streakboard === 'function') {
          render_streakboard();
        }
      }

      function save_timer_state() {
        localStorage.setItem('tic-tac-toe-timer-enabled', String(timer_enabled));
      }

      function load_timer_state() {
        const stored_enabled = localStorage.getItem('tic-tac-toe-timer-enabled');
        timer_enabled = stored_enabled === 'true';
        timer_remaining_seconds = TURN_TIMER_SECONDS;
        timer_toggle.checked = timer_enabled;
        update_timer_display();
      }

      function update_timer_display() {
        if (!timer_enabled || game_over) {
          timer_display.textContent = '';
          timer_display.classList.remove('critical');
          return;
        }
        timer_display.textContent = String(timer_remaining_seconds) + 's';
        timer_display.classList.remove('critical');
        if (timer_remaining_seconds <= 3) {
          timer_display.classList.add('critical');
        }
      }

      function start_timer() {
        if (!timer_enabled || game_over || timer_interval_id !== null) return;
        timer_remaining_seconds = TURN_TIMER_SECONDS;
        update_timer_display();
        timer_interval_id = setInterval(() => {
          timer_remaining_seconds -= 1;
          update_timer_display();
          if (timer_remaining_seconds <= 0) {
            handle_timer_expiration();
          }
        }, 1000);
      }

      function stop_timer() {
        if (timer_interval_id !== null) {
          clearInterval(timer_interval_id);
          timer_interval_id = null;
        }
        timer_display.textContent = '';
        timer_display.classList.remove('critical');
      }

      function reset_timer() {
        stop_timer();
        if (timer_enabled && !game_over) {
          start_timer();
        }
      }

      function handle_timer_expiration() {
        stop_timer();
        render_status(`${get_display_name(current_player)} ran out of time!`);
        current_player = current_player === 'X' ? 'O' : 'X';
        update_board_data_attributes();
        save_game_state();
        setTimeout(() => {
          if (!game_over) {
            render_status(`${get_display_name(current_player)}'s turn`);
            start_timer();
          }
        }, 1500);
      }

      function get_current_theme() {
        return document.documentElement.classList.contains('dark-theme') ? 'dark' : 'light';
      }

      function get_current_palette_theme() {
        const html_element = document.documentElement;
        for (const theme of ['classic', 'ocean', 'sunset', 'forest']) {
          if (html_element.classList.contains('theme-' + theme)) {
            return theme;
          }
        }
        return 'classic';
      }

      function update_theme_toggle_icon() {
        const is_dark = get_current_theme() === 'dark';
        theme_toggle_button.textContent = is_dark ? '☀️' : '🌙';
        theme_toggle_button.setAttribute('aria-label', is_dark ? 'Switch to light mode' : 'Switch to dark mode');
      }

      function toggle_theme() {
        const html_element = document.documentElement;
        const is_currently_dark = get_current_theme() === 'dark';
        const new_theme = is_currently_dark ? 'light' : 'dark';

        if (new_theme === 'dark') {
          html_element.classList.add('dark-theme');
        } else {
          html_element.classList.remove('dark-theme');
        }

        localStorage.setItem('darkMode', String(new_theme === 'dark'));
        update_theme_toggle_icon();
        update_favicon();
      }

      function set_palette_theme(theme_name) {
        const html_element = document.documentElement;

        // Remove all existing palette theme classes
        html_element.classList.remove('theme-classic', 'theme-ocean', 'theme-sunset', 'theme-forest');

        // Add new palette theme class
        html_element.classList.add('theme-' + theme_name);

        // Save to localStorage
        localStorage.setItem('tic-tac-toe-palette-theme', theme_name);

        // Update active button state
        theme_buttons.forEach(btn => {
          if (btn.dataset.theme === theme_name) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });

        update_favicon();
      }

      function update_board_data_attributes() {
        const board_element = document.getElementById('board');
        board_element.dataset.turn = current_player === 'X' ? 'x' : 'o';
        if (game_over) {
          board_element.dataset.gameOver = 'true';
        } else {
          delete board_element.dataset.gameOver;
        }
      }

      function render_status(message, css_class) {
        status_element.textContent = message;
        status_element.classList.remove('win-x', 'win-o', 'draw');
        if (css_class) status_element.classList.add(css_class);
      }

      function render_scoreboard() {
        score_x_element.textContent = String(score_x_wins);
        score_o_element.textContent = String(score_o_wins);
        score_draws_element.textContent = String(score_draws);
        render_streakboard();
      }

      function render_streakboard() {
        current_streak_element.classList.remove('current-streak-x', 'current-streak-o', 'current-streak-none');
        if (current_streak_count === 0 || current_streak_player === null) {
          current_streak_element.textContent = 'No streak';
          current_streak_element.classList.add('current-streak-none');
        } else {
          current_streak_element.textContent =
            `${get_display_name(current_streak_player)}: ${current_streak_count} streak`;
          current_streak_element.classList.add(
            current_streak_player === 'X' ? 'current-streak-x' : 'current-streak-o'
          );
        }

        best_streak_element.classList.remove('best-streak-x', 'best-streak-o', 'best-streak-none');
        if (best_streak_count === 0 || best_streak_player === null) {
          best_streak_element.innerHTML = 'Best: &mdash;';
          best_streak_element.classList.add('best-streak-none');
        } else {
          best_streak_element.textContent =
            `Best: ${get_display_name(best_streak_player)} ${best_streak_count}`;
          best_streak_element.classList.add(
            best_streak_player === 'X' ? 'best-streak-x' : 'best-streak-o'
          );
        }
      }

      function record_win_streak(winning_player) {
        if (current_streak_player === winning_player) {
          current_streak_count += 1;
        } else {
          current_streak_player = winning_player;
          current_streak_count = 1;
        }
        if (current_streak_count > best_streak_count) {
          best_streak_player = current_streak_player;
          best_streak_count = current_streak_count;
        }
      }

      function reset_current_streak() {
        current_streak_player = null;
        current_streak_count = 0;
      }

      function detect_winner() {
        for (const line of WIN_LINES) {
          const [a, b, c] = line;
          if (board_state[a] && board_state[a] === board_state[b] && board_state[a] === board_state[c]) {
            return { player: board_state[a], line };
          }
        }
        return null;
      }

      function highlight_winning_line(line) {
        for (const cell_index of line) {
          board_cells[cell_index].classList.add('winning');
        }
      }

      function is_draw() {
        return board_state.every(cell => cell !== '');
      }

      function create_x_mark_svg() {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.setAttribute('class', 'x-mark');

        // Calculate stroke length for dasharray (diagonal lines)
        const stroke_length = Math.sqrt(100 * 100 + 100 * 100) / Math.sqrt(2);

        // First diagonal: top-left to bottom-right
        const path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path1.setAttribute('d', 'M 20 20 L 80 80');
        path1.setAttribute('style', `--stroke-length: ${stroke_length}`);
        path1.setAttribute('stroke-dasharray', stroke_length);

        // Second diagonal: top-right to bottom-left
        const path2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path2.setAttribute('d', 'M 80 20 L 20 80');
        path2.setAttribute('style', `--stroke-length: ${stroke_length}`);
        path2.setAttribute('stroke-dasharray', stroke_length);

        svg.appendChild(path1);
        svg.appendChild(path2);

        return svg;
      }

      function create_o_mark_svg() {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.setAttribute('class', 'o-mark');

        // Circle with radius 30, centered at (50, 50)
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', '50');
        circle.setAttribute('cy', '50');
        circle.setAttribute('r', '30');

        // Calculate circumference for stroke animation
        const circumference = 2 * Math.PI * 30;
        circle.setAttribute('stroke-dasharray', circumference);
        circle.setAttribute('style', `--o-stroke-length: ${circumference}`);

        svg.appendChild(circle);

        return svg;
      }

      function render_history() {
        history_list_element.innerHTML = '';
        if (move_history.length === 0) {
          history_empty_element.style.display = '';
        } else {
          history_empty_element.style.display = 'none';
          move_history.forEach((entry, index) => {
            const li = document.createElement('li');

            const move_number_span = document.createElement('span');
            move_number_span.className = 'history-move-number';
            move_number_span.textContent = `${index + 1}.`;

            const player_span = document.createElement('span');
            player_span.className = entry.player === 'X' ? 'history-player-x' : 'history-player-o';
            player_span.textContent = entry.player;

            const to_span = document.createElement('span');
            to_span.textContent = 'to';

            const cell_name_span = document.createElement('span');
            cell_name_span.className = 'history-cell-name';
            cell_name_span.textContent = CELL_POSITION_NAMES[entry.cell];

            li.append(move_number_span, player_span, to_span, cell_name_span);
            history_list_element.appendChild(li);
          });
          history_list_element.scrollTop = history_list_element.scrollHeight;
        }
        update_undo_button_state();
      }

      function update_undo_button_state() {
        undo_button.disabled = move_history.length === 0 || game_over;
      }

      function undo_last_move() {
        if (game_over || move_history.length === 0) return;
        const last_entry = move_history.pop();
        const cell_index = last_entry.cell;
        const cell_element = board_cells[cell_index];
        board_state[cell_index] = '';
        cell_element.innerHTML = '';
        cell_element.classList.remove('x', 'o', 'winning');
        cell_element.disabled = false;
        current_player = last_entry.player;
        render_status(`${get_display_name(current_player)}'s turn`);
        update_favicon();
        update_board_data_attributes();
        render_history();
        reset_timer();
      }

      function handle_cell_click(event) {
        if (game_over) return;
        const cell_index = Number(event.currentTarget.dataset.index);
        if (board_state[cell_index] !== '') return;

        board_state[cell_index] = current_player;
        move_history.push({ cell: cell_index, player: current_player });
        event.currentTarget.textContent = '';
        const mark_svg = current_player === 'X' ? create_x_mark_svg() : create_o_mark_svg();
        event.currentTarget.appendChild(mark_svg);
        event.currentTarget.classList.add(current_player.toLowerCase());

        play_click_sound();
        render_history();

        const winning_result = detect_winner();
        if (winning_result) {
          const winning_player = winning_result.player;
          game_over = true;
          stop_timer();
          if (winning_player === 'X') {
            score_x_wins += 1;
          } else {
            score_o_wins += 1;
          }
          record_win_streak(winning_player);
          highlight_winning_line(winning_result.line);
          render_scoreboard();
          const winning_display_name = get_display_name(winning_player);
          render_status(`${winning_display_name} wins!`, winning_player === 'X' ? 'win-x' : 'win-o');
          current_player_was_winner = true;
          update_favicon();
          update_board_data_attributes();
          disable_remaining_cells();
          update_undo_button_state();
          save_game_state();
          trigger_confetti();
          play_win_sound();
          show_game_over_modal('win', winning_player);
          return;
        }

        if (is_draw()) {
          game_over = true;
          stop_timer();
          score_draws += 1;
          reset_current_streak();
          render_scoreboard();
          render_status("Draw", 'draw');
          current_player_was_winner = false;
          update_favicon();
          update_board_data_attributes();
          update_undo_button_state();

          // Trigger shake animation
          const board_element = document.getElementById('board');
          board_element.classList.add('shake');

          // Remove shake class after animation ends so it can trigger again
          const remove_shake = () => {
            board_element.classList.remove('shake');
            board_element.removeEventListener('animationend', remove_shake);
          };
          board_element.addEventListener('animationend', remove_shake);

          save_game_state();
          play_draw_sound();
          show_game_over_modal('draw');
          return;
        }

        current_player = current_player === 'X' ? 'O' : 'X';
        render_status(`${get_display_name(current_player)}'s turn`);
        update_favicon();
        update_board_data_attributes();
        reset_timer();
        save_game_state();
      }

      function disable_remaining_cells() {
        board_cells.forEach(cell => { cell.disabled = true; });
      }

      let first_player_announcement_timeout_id = null;
      const first_player_announcement_element = document.getElementById('first-player-announcement');

      function show_first_player_announcement(player_symbol) {
        if (!first_player_announcement_element) return;
        if (first_player_announcement_timeout_id !== null) {
          clearTimeout(first_player_announcement_timeout_id);
          first_player_announcement_timeout_id = null;
        }
        first_player_announcement_element.textContent =
          `${get_display_name(player_symbol)} goes first!`;
        first_player_announcement_element.classList.remove('show', 'fp-x', 'fp-o');
        // Force reflow so the animation restarts on repeat calls.
        void first_player_announcement_element.offsetWidth;
        first_player_announcement_element.classList.add(
          'show',
          player_symbol === 'X' ? 'fp-x' : 'fp-o'
        );
        first_player_announcement_timeout_id = setTimeout(() => {
          first_player_announcement_element.classList.remove('show');
          first_player_announcement_timeout_id = null;
        }, 2000);
      }

      function show_game_over_modal(result_kind, winning_player) {
        game_over_title.classList.remove('win-x', 'win-o', 'draw');
        if (result_kind === 'draw') {
          game_over_title.textContent = 'Draw!';
          game_over_title.classList.add('draw');
        } else {
          game_over_title.textContent = `${get_display_name(winning_player)} wins!`;
          game_over_title.classList.add(winning_player === 'X' ? 'win-x' : 'win-o');
        }
        game_over_modal.hidden = false;
        requestAnimationFrame(() => { game_over_modal.classList.add('open'); });
        play_again_button.focus();
      }

      function close_game_over_modal() {
        game_over_modal.classList.remove('open');
        game_over_modal.hidden = true;
      }

      function handle_play_again() {
        if (game_over_modal.hidden) return;
        close_game_over_modal();
        reset_game();
      }

      function reset_game() {
        cleanup_confetti();
        stop_timer();
        const board_element = document.getElementById('board');
        board_element.classList.remove('shake');
        board_state = Array(9).fill('');
        move_history = [];
        first_player_this_round = Math.random() < 0.5 ? 'X' : 'O';
        current_player = first_player_this_round;
        game_over = false;
        current_player_was_winner = false;
        board_cells.forEach(cell => {
          cell.innerHTML = '';
          cell.classList.remove('x', 'o', 'winning');
          cell.disabled = false;
        });
        render_status(`${get_display_name(first_player_this_round)}'s turn`);
        show_first_player_announcement(first_player_this_round);
        update_favicon();
        update_board_data_attributes();
        render_history();
        start_timer();
        save_game_state();
      }

      function reset_scores() {
        score_x_wins = 0;
        score_o_wins = 0;
        score_draws = 0;
        current_streak_player = null;
        current_streak_count = 0;
        best_streak_player = null;
        best_streak_count = 0;
        render_scoreboard();
        save_game_state();
      }

      board_cells.forEach(cell => cell.addEventListener('click', handle_cell_click));
      reset_button.addEventListener('click', reset_game);
      reset_scores_button.addEventListener('click', () => {
        if (window.confirm('Reset scores to 0?')) {
          reset_scores();
        }
      });
      undo_button.addEventListener('click', undo_last_move);
      clear_all_button.addEventListener('click', clear_all_persistence);
      theme_toggle_button.addEventListener('click', toggle_theme);
      theme_buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          set_palette_theme(btn.dataset.theme);
        });
      });
      audio_toggle_button.addEventListener('click', () => {
        audio_enabled = !audio_enabled;
        save_audio_state();
        update_audio_toggle_icon();
      });
      set_names_button.addEventListener('click', save_player_names);
      change_names_button.addEventListener('click', show_names_modal);
      play_again_button.addEventListener('click', handle_play_again);
      document.addEventListener('keydown', (key_event) => {
        if (game_over_modal.hidden) return;
        if (key_event.key === 'Escape' || key_event.key === 'Enter') {
          key_event.preventDefault();
          handle_play_again();
        } else if (key_event.key === 'Tab') {
          key_event.preventDefault();
          play_again_button.focus();
        }
      });

      timer_toggle.addEventListener('change', (e) => {
        timer_enabled = e.target.checked;
        save_timer_state();
        if (timer_enabled && !game_over) {
          start_timer();
        } else {
          stop_timer();
        }
      });

      player_x_input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') save_player_names();
      });
      player_o_input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') save_player_names();
      });

      function load_palette_theme() {
        const saved_theme = localStorage.getItem('tic-tac-toe-palette-theme') || 'classic';
        const current_palette = get_current_palette_theme();
        if (current_palette !== saved_theme) {
          set_palette_theme(saved_theme);
        } else {
          // Just update the button states if theme was already applied
          theme_buttons.forEach(btn => {
            if (btn.dataset.theme === saved_theme) {
              btn.classList.add('active');
            } else {
              btn.classList.remove('active');
            }
          });
        }
      }

      load_player_names();
      load_timer_state();
      load_audio_state();
      load_palette_theme();
      const game_state_was_restored = restore_game_state_from_storage();
      render_scoreboard();
      render_history();
      update_theme_toggle_icon();
      update_audio_toggle_icon();
      update_favicon();
      update_board_data_attributes();
      if (!names_set) {
        show_names_modal();
      } else if (game_state_was_restored) {
        render_restored_board();
        update_favicon();
        if (!game_over) {
          start_timer();
        }
      } else {
        render_status(`${get_display_name(first_player_this_round)}'s turn`);
        show_first_player_announcement(first_player_this_round);
        start_timer();
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (registration_error) {
          console.warn('Service worker registration failed:', registration_error);
        });
      });
    }
  </script>
</body>
